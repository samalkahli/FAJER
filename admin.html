<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة ATHNTA - لوحة التحكم</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root { --primary: #cba26a; --background: #101010; --card-bg: #1a1a1a; --text-main: #ffffff; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--background); margin: 0; color: var(--text-main); padding-bottom: 50px; display: none; /* إخفاء الصفحة حتى التأكد من الدخول */ }
        header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); position: relative;}
        .logo { height: 60px; filter: drop-shadow(0 0 5px rgba(203, 162, 106, 0.5)); }
        .logout-btn { position: absolute; left: 20px; top: 35px; background: #dc3545; color: #fff; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .tabs { display: flex; justify-content: center; gap: 5px; padding: 15px; background: var(--card-bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .tabs button { background: transparent; border: 1px solid var(--border); color: #aaa; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .tabs button.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .tab-content { display: none; max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .tab-content.active { display: block; }
        .admin-box { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary); margin-top: 0; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 15px; }
        .drop-zone { border: 2px dashed rgba(203,162,106,0.5); padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; background: rgba(203,162,106,0.05); margin-bottom: 15px; transition: 0.3s; }
        .drop-zone.dragover { background: rgba(203,162,106,0.2); border-color: var(--primary); }
        button.action-btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); margin-bottom: 10px; border-radius: 8px; flex-wrap: wrap; gap: 10px;}
        .list-item img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; }
        .btn-group { display: flex; gap: 5px; }
        .danger-btn { background: #dc3545; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #ffc107; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 10px; border: 1px solid var(--primary); width: 90%; max-width: 450px; position: relative; }
    </style>
</head>
<body>

    <header>
        <button class="logout-btn" onclick="logout()">خروج</button>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo">
        <h2 style="margin: 0; color: #cba26a;">لوحة التحكم</h2>
    </header>

    <div class="tabs">
        <button class="active" onclick="switchTab(event, 'productsTab')">المنتجات</button>
        <button onclick="switchTab(event, 'catsTab')">التصنيفات</button>
    </div>

    <div id="productsTab" class="tab-content active">
        <div class="admin-box">
            <h2>إضافة منتج ✨</h2>
            <input type="text" id="productName" placeholder="اسم المنتج">
            <div style="display: flex; gap: 10px;">
                <select id="productMainCat" onchange="loadSubCats('productMainCat', 'productSubCat')"></select>
                <select id="productSubCat"><option value="">اختر الرئيسي أولاً</option></select>
            </div>
            <div class="drop-zone" id="prodDropZone">
                اسحب الصورة هنا أو اضغط للاختيار 🖼️
                <input type="file" id="productImageFile" style="display:none;" accept="image/*">
                <div id="prodFileName" style="color:var(--primary); margin-top:10px;"></div>
            </div>
            <button class="action-btn" id="prodSubmitBtn" onclick="saveProduct()">رفع وحفظ</button>
        </div>
        <div id="productsList"></div>
    </div>

    <div id="catsTab" class="tab-content">
        <div class="admin-box">
            <h2>إضافة تصنيف رئيسي (بصورة)</h2>
            <input type="text" id="newMainCatName" placeholder="اسم التصنيف">
            <div class="drop-zone" id="catDropZone">
                اسحب صورة غلاف التصنيف هنا 🖼️
                <input type="file" id="catImageFile" style="display:none;" accept="image/*">
                <div id="catFileName" style="color:var(--primary); margin-top:10px;"></div>
            </div>
            <button class="action-btn" id="catSubmitBtn" onclick="saveMainCategory()">إنشاء القسم</button>
        </div>
        <div class="admin-box">
            <h2>إضافة فرعي</h2>
            <div style="display: flex; gap: 10px;">
                <select id="mainCatForSub"></select>
                <input type="text" id="newSubCatName" placeholder="اسم الفرعي">
            </div>
            <button class="action-btn" onclick="saveSubCategory()">إضافة</button>
        </div>
        <div id="categoriesAdminList"></div>
    </div>

    <div class="modal" id="editProductModal">
        <div class="modal-content">
            <button style="position:absolute; left:15px; top:15px; background:none; border:none; color:#fff; cursor:pointer; font-size:24px;" onclick="closeModal()">×</button>
            <h2 style="color:var(--primary)">تعديل المنتج</h2>
            <input type="hidden" id="editDocId">
            <input type="text" id="editProductName">
            <select id="editProductMainCat" onchange="loadSubCats('editProductMainCat', 'editProductSubCat')"></select>
            <select id="editProductSubCat"></select>
            <div class="drop-zone" id="editDropZone">تغيير الصورة (اختياري)
                <input type="file" id="editImageFile" style="display:none;" accept="image/*">
                <div id="editFileName" style="color:var(--primary); margin-top:5px;"></div>
            </div>
            <button class="action-btn" id="updateBtn" onclick="updateProduct()">حفظ التعديل</button>
        </div>
    </div>

    <script>
        // استخدام المفتاح المصحح (N كبيرة)
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // فحص حالة الدخول فوراً
        auth.onAuthStateChanged(user => {
            if (user) {
                document.body.style.display = 'block'; // إظهار الصفحة إذا كان مسجل دخول
                init(); 
            } else {
                window.location.href = 'login.html'; // طرده للوجن إذا لم يسجل دخول
            }
        });

        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }

        let siteCategories = {};
        let currentImg = "";

        // السحب والإفلات
        function setupDZ(zId, iId, tId) {
            const z = document.getElementById(zId), i = document.getElementById(iId), t = document.getElementById(tId);
            if(!z) return;
            z.onclick = () => i.click();
            z.ondragover = (e) => { e.preventDefault(); z.classList.add('dragover'); };
            z.ondragleave = () => z.classList.remove('dragover');
            z.ondrop = (e) => { e.preventDefault(); z.classList.remove('dragover'); i.files = e.dataTransfer.files; t.innerText = i.files[0].name; };
            i.onchange = () => { if(i.files.length) t.innerText = i.files[0].name; };
        }
        setupDZ('prodDropZone', 'productImageFile', 'prodFileName');
        setupDZ('catDropZone', 'catImageFile', 'catFileName');
        setupDZ('editDropZone', 'editImageFile', 'editFileName');

        const imgbbAPIKey = "28f606ee4a697fac01f86c4f0a3cb51b"; 
        async function upload(file) {
            let fd = new FormData(); fd.append('image', file);
            let res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, { method: 'POST', body: fd });
            let d = await res.json(); return d.data.display_url;
        }

        async function saveMainCategory() {
            const n = document.getElementById('newMainCatName').value, f = document.getElementById('catImageFile').files[0];
            if(!n || !f) return alert("اكمل البيانات");
            const url = await upload(f);
            await db.collection("categories").doc(n).set({ imageUrl: url, subs: [] });
            location.reload();
        }

        async function saveSubCategory() {
            const m = document.getElementById('mainCatForSub').value, s = document.getElementById('newSubCatName').value;
            await db.collection("categories").doc(m).update({ subs: firebase.firestore.FieldValue.arrayUnion(s) });
            location.reload();
        }

        window.loadSubCats = function(mId, sId, sel = '') {
            const m = document.getElementById(mId).value, sSelect = document.getElementById(sId);
            sSelect.innerHTML = '<option value="">بدون فرعي</option>';
            if(m && siteCategories[m]) siteCategories[m].subs.forEach(sub => sSelect.innerHTML += `<option value="${sub}" ${sub===sel?'selected':''}>${sub}</option>`);
        };

        async function saveProduct() {
            const n = document.getElementById('productName').value, m = document.getElementById('productMainCat').value, s = document.getElementById('productSubCat').value, f = document.getElementById('productImageFile').files[0];
            if(!n || !m || !f) return alert("اكمل البيانات");
            const url = await upload(f);
            await db.collection("products").add({ name: n, mainCategory: m, subCategory: s || "عام", imageUrl: url, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            location.reload();
        }

        window.openEditModal = function(id, n, m, s, img) {
            document.getElementById('editProductModal').classList.add('active');
            document.getElementById('editDocId').value = id;
            document.getElementById('editProductName').value = n;
            currentImg = img;
            loadSubCats('editProductMainCat', 'editProductSubCat', s);
        }
        function closeModal() { document.getElementById('editProductModal').classList.remove('active'); }

        async function updateProduct() {
            const id = document.getElementById('editDocId').value, n = document.getElementById('editProductName').value, m = document.getElementById('editProductMainCat').value, s = document.getElementById('editProductSubCat').value, f = document.getElementById('editImageFile').files[0];
            let url = currentImg; if(f) url = await upload(f);
            await db.collection("products").doc(id).update({ name: n, mainCategory: m, subCategory: s || "عام", imageUrl: url });
            location.reload();
        }

        async function deleteP(id) { if(confirm("حذف؟")) { await db.collection("products").doc(id).delete(); location.reload(); } }
        async function deleteC(id) { if(confirm("حذف القسم؟")) { await db.collection("categories").doc(id).delete(); location.reload(); } }

        window.switchTab = function(e, id) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active'); document.getElementById(id).classList.add('active');
        }

        async function init() {
            const cSnap = await db.collection("categories").get();
            const pMain = document.getElementById('productMainCat'), sMain = document.getElementById('mainCatForSub'), eMain = document.getElementById('editProductMainCat'), cList = document.getElementById('categoriesAdminList');
            pMain.innerHTML = sMain.innerHTML = eMain.innerHTML = '<option value="">اختر القسم</option>';
            cSnap.forEach(doc => {
                siteCategories[doc.id] = doc.data();
                const opt = `<option value="${doc.id}">${doc.id}</option>`;
                pMain.innerHTML += opt; sMain.innerHTML += opt; eMain.innerHTML += opt;
                cList.innerHTML += `<div class="list-item"><span>${doc.id}</span><button class="danger-btn" onclick="deleteC('${doc.id}')">حذف</button></div>`;
            });

            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            const pList = document.getElementById('productsList');
            pSnap.forEach(doc => {
                const p = doc.data();
                pList.innerHTML += `<div class="list-item"><div style="display:flex;align-items:center;"><img src="${p.imageUrl}"><div><strong>${p.name}</strong><br><small>${p.mainCategory}</small></div></div><div class="btn-group"><button class="edit-btn" onclick="openEditModal('${doc.id}','${p.name}','${p.mainCategory}','${p.subCategory}','${p.imageUrl}')">تعديل</button><button class="danger-btn" onclick="deleteP('${doc.id}')">حذف</button></div></div>`;
            });
        }
    </script>
</body>
</html>
