<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة ATHNTA - لوحة التحكم الشاملة</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { --primary: #cba26a; --background: #101010; --card-bg: #1a1a1a; --text-main: #ffffff; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--background); margin: 0; color: var(--text-main); padding-bottom: 50px; display: none; }
        
        header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); position: relative; background: #000; }
        .logo { height: 60px; filter: drop-shadow(0 0 5px var(--primary)); }
        .logout-btn { position: absolute; left: 15px; top: 25px; background: #dc3545; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }

        .tabs { display: flex; justify-content: center; gap: 8px; padding: 15px; background: var(--card-bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .tabs button { background: transparent; border: 1px solid var(--border); color: #aaa; padding: 12px 20px; border-radius: 8px; cursor: pointer; flex: 1; font-size: 16px; }
        .tabs button.active { background: var(--primary); color: #000; font-weight: bold; }

        .tab-content { display: none; max-width: 800px; margin: 15px auto; padding: 0 10px; }
        .tab-content.active { display: block; }

        .admin-box { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary); margin-top: 0; font-size: 18px; }
        
        input, select { width: 100%; padding: 15px; border: 1px solid #333; border-radius: 10px; background: #000; color: #fff; margin-bottom: 15px; font-size: 16px; }

        /* شريط التحميل */
        #uploadProgress { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: #000; z-index: 1000; display: none; }
        #pBar { height: 100%; width: 0%; background: var(--primary); transition: 0.3s; box-shadow: 0 0 10px var(--primary); }

        .drop-zone { border: 2px dashed #444; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; background: #0d0d0d; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; margin-bottom: 15px; }
        .drop-zone span { color: #888; }
        .drop-zone.has-img span { display: none; }
        
        .img-preview-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
        .img-preview-container img { height: 80px; width: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }

        .edit-img-wrap { position: relative; display: inline-block; }
        .edit-img-wrap img { height: 90px; width: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }
        .delete-img-btn { position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; font-weight: bold; line-height: 1; padding: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        button.action-btn { background: var(--primary); color: #000; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }

        .list-item { background: #151515; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .item-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .item-row img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
        
        .btn-group-large { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group-large button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .danger-btn { background: #441111; color: #ff4d4d; border: 1px solid #661111; }
        .edit-btn { background: #1a1a00; color: #ffc107; border: 1px solid #444400; }

        .sub-tag { background: #222; padding: 10px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; margin: 5px 0; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* =========================================
           تصميم الأوكارديون (Accordion) والسحب والإفلات
           ========================================= */
        .accordion-header { background: #222; padding: 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border: 1px solid var(--border); transition: 0.3s; }
        .accordion-header:hover { background: #333; }
        .accordion-content { display: none; padding: 15px; border-right: 2px solid var(--primary); margin-bottom: 15px; background: #111; border-radius: 0 0 8px 8px; }
        .accordion-content.open { display: block; animation: slideDown 0.3s ease; }
        
        /* تدرج الألوان للأقسام الفرعية لتمييزها */
        .sub-header { background: #1a1a1a; border-right: 3px solid #555; }
        .sub-content { border-right: 2px solid #555; background: #0a0a0a; }

        /* أيقونة السحب والإفلات */
        .drag-handle { cursor: grab; font-size: 24px; color: #888; padding: 0 15px; user-select: none; }
        .drag-handle:active { cursor: grabbing; color: var(--primary); }
        
        /* شكل العنصر أثناء سحبه */
        .sortable-ghost { opacity: 0.4; background: #333; border: 1px dashed var(--primary); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="uploadProgress"><div id="pBar"></div></div>
    <div id="toast" class="toast">تم الإجراء بنجاح! ✅</div>

    <header>
        <button class="logout-btn" onclick="logout()">خروج</button>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo">
    </header>

    <div class="tabs">
        <button class="active" id="btnProductsTab" onclick="switchTab(event, 'productsTab')">المنتجات</button>
        <button id="btnCatsTab" onclick="switchTab(event, 'catsTab')">التصنيفات</button>
    </div>

    <div id="productsTab" class="tab-content active">
        <div class="admin-box">
            <h2>إضافة منتج ✨</h2>
            <input type="text" id="productName" placeholder="اسم المنتج">
            <div style="display: flex; gap: 10px;">
                <select id="productMainCat" onchange="loadSubCats('productMainCat', 'productSubCat')"></select>
                <select id="productSubCat"></select>
            </div>
            <div class="drop-zone" id="prodDZ" onclick="document.getElementById('productFile').click()">
                <div id="prodPrevContainer" class="img-preview-container"></div>
                <span>اضغط لاختيار صور المنتج 📸 (يمكن تحديد أكثر من صورة)</span>
                <input type="file" id="productFile" style="display:none;" multiple onchange="previewMultiple(this, 'prodPrevContainer', 'prodDZ')">
            </div>
            <button class="action-btn" id="prodBtn" onclick="saveProduct()">رفع وحفظ المنتج</button>
        </div>
        
        <div id="productsList"></div>
    </div>

    <div id="catsTab" class="tab-content">
        <div class="admin-box">
            <h2>قسم رئيسي جديد 🖼️</h2>
            <input type="text" id="newMainCat" placeholder="اسم القسم الرئيسي">
            <div class="drop-zone" id="catDZ" onclick="document.getElementById('catFile').click()">
                <div id="catPrevContainer" class="img-preview-container"></div>
                <span>صورة غلاف القسم 📂</span>
                <input type="file" id="catFile" style="display:none;" onchange="previewMultiple(this, 'catPrevContainer', 'catDZ')">
            </div>
            <button class="action-btn" id="catBtn" onclick="saveMainCategory()">إنشاء القسم</button>
        </div>
        <div class="admin-box">
            <h2>إضافة فرعي 🔗</h2>
            <select id="mainCatForSub"></select>
            <input type="text" id="newSubCat" placeholder="اسم القسم الفرعي">
            <button class="action-btn" id="subBtn" onclick="saveSubCategory()" style="background:#444; color:#fff;">إضافة فرعي</button>
        </div>
        
        <div id="categoriesAdminList"></div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2 style="color:var(--primary)">تعديل المنتج والتحكم بالصور</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="اسم المنتج">
            <select id="editMainCat" onchange="loadSubCats('editMainCat', 'editSubCat')"></select>
            <select id="editSubCat"></select>
            
            <div style="margin-bottom: 15px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333;">
                <label style="color:var(--primary); font-size:14px; display:block; margin-bottom:10px; font-weight:bold;">الصور الحالية للمنتج (اضغط ❌ للحذف):</label>
                <div id="editPrevContainer" class="img-preview-container" style="justify-content: flex-start; gap: 15px;"></div>
            </div>

            <div class="drop-zone" id="editDZ" onclick="document.getElementById('editFile').click()">
                <div id="newEditPrevContainer" class="img-preview-container"></div>
                <span>اضغط لإضافة صور جديدة 📸 (ستنضم للصور الحالية)</span>
                <input type="file" id="editFile" style="display:none;" multiple onchange="previewMultiple(this, 'newEditPrevContainer', 'editDZ')">
            </div>

            <div class="btn-group-large">
                <button class="edit-btn" id="updateBtn" onclick="updateProduct()">حفظ التعديلات</button>
                <button class="danger-btn" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();

        function updateS() { localStorage.setItem('at', Date.now()); }
        function checkS() { if (localStorage.getItem('at') && (Date.now() - localStorage.getItem('at') > 3600000)) logout(); }
        setInterval(checkS, 30000);
        auth.onAuthStateChanged(u => { if(u){updateS(); document.body.style.display='block'; init();} else window.location.href='login.html'; });
        function logout() { localStorage.clear(); auth.signOut().then(()=>window.location.href='login.html'); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        async function startProgress() {
            document.getElementById('uploadProgress').style.display = 'block';
            let p = 0, bar = document.getElementById('pBar');
            return new Promise(res => {
                let itv = setInterval(() => {
                    p += Math.random() * 15;
                    if(p >= 90) { clearInterval(itv); res(); }
                    bar.style.width = p + '%';
                }, 150);
            });
        }

        function endProgress() {
            document.getElementById('pBar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('uploadProgress').style.display = 'none';
                document.getElementById('pBar').style.width = '0%';
            }, 500);
        }

        function previewMultiple(input, containerId, zoneId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            if (input.files && input.files.length > 0) {
                document.getElementById(zoneId).classList.add('has-img');
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => { container.innerHTML += `<img src="${e.target.result}">`; };
                    reader.readAsDataURL(file);
                });
            }
        }

        const imgbbKey = "28f606ee4a697fac01f86c4f0a3cb51b";
        async function up(f) {
            let fd = new FormData(); fd.append('image', f);
            let r = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: 'POST', body: fd });
            let d = await r.json(); return d.data.display_url;
        }

        window.loadSubCats = (mId, sId, sel = '') => {
            const m = document.getElementById(mId).value, s = document.getElementById(sId);
            s.innerHTML = '<option value="">(بدون فرعي)</option>';
            if(m && siteCategories[m]) siteCategories[m].subs.forEach(sub => s.innerHTML += `<option value="${sub}" ${sub===sel?'selected':''}>${sub}</option>`);
        };

        // دالة الأوكارديون المركزية
        window.toggleAccordion = (headerEl, groupClass) => {
            const content = headerEl.nextElementSibling;
            const isOpen = content.classList.contains('open');

            // إغلاق كل المحتويات اللي في نفس المجموعة
            document.querySelectorAll(`.${groupClass}`).forEach(el => el.classList.remove('open'));
            
            // تعديل الأسهم لكل الهيدرز
            document.querySelectorAll(`.${groupClass}`).forEach(el => {
                const arrow = el.previousElementSibling.querySelector('.arrow');
                if(arrow) arrow.innerText = '▼';
            });

            // فتح العنصر المضغوط إذا كان مغلق
            if (!isOpen) {
                content.classList.add('open');
                const myArrow = headerEl.querySelector('.arrow');
                if(myArrow) myArrow.innerText = '▲';
            }
        };

        async function saveProduct() {
            const n = document.getElementById('productName').value;
            const m = document.getElementById('productMainCat').value;
            const s = document.getElementById('productSubCat').value;
            const files = document.getElementById('productFile').files;
            
            if(!n || !m || files.length === 0) return alert("الرجاء إدخال اسم المنتج واختيار القسم واختيار صورة واحدة على الأقل");
            
            await startProgress();
            let uploadedUrls = [];
            for (let i = 0; i < files.length; i++) {
                let url = await up(files[i]);
                uploadedUrls.push(url);
            }

            await db.collection("products").add({ 
                name: n, mainCategory: m, subCategory: s || "عام", imageURLs: uploadedUrls, timestamp: firebase.firestore.FieldValue.serverTimestamp() 
            });
            
            endProgress();
            showToast("تم رفع المنتج بنجاح! ✅");
            document.getElementById('productName').value = ''; 
            document.getElementById('productFile').value = '';
            document.getElementById('prodPrevContainer').innerHTML = '';
            document.getElementById('prodDZ').classList.remove('has-img');
            init(); 
        }

        async function saveMainCategory() {
            const n = document.getElementById('newMainCat').value, f = document.getElementById('catFile').files[0];
            if(!n || !f) return alert("أكمل البيانات");
            await startProgress();
            const url = await up(f);
            // نعطيه أعلى رقم ترتيب عشان ينزل آخر شيء
            const orderIndex = Object.keys(siteCategories).length;
            await db.collection("categories").doc(n).set({ imageUrl: url, subs: [], order: orderIndex });
            endProgress();
            showToast("تم إنشاء القسم! ✅");
            document.getElementById('newMainCat').value = '';
            document.getElementById('catPrevContainer').innerHTML = '';
            document.getElementById('catDZ').classList.remove('has-img');
            init();
        }

        async function saveSubCategory() {
            const m = document.getElementById('mainCatForSub').value, s = document.getElementById('newSubCat').value;
            if(!m || !s) return alert("أكمل البيانات");
            await startProgress();
            await db.collection("categories").doc(m).update({ subs: firebase.firestore.FieldValue.arrayUnion(s) });
            endProgress();
            showToast("تمت إضافة القسم الفرعي! ✅");
            document.getElementById('newSubCat').value = '';
            init();
        }

        window.editSub = async (m, oldS) => {
            const newS = prompt("تعديل القسم الفرعي:", oldS);
            if(newS && newS !== oldS) {
                await startProgress();
                await db.collection("categories").doc(m).update({ subs: firebase.firestore.FieldValue.arrayRemove(oldS) });
                await db.collection("categories").doc(m).update({ subs: firebase.firestore.FieldValue.arrayUnion(newS) });
                const ps = await db.collection("products").where("mainCategory","==",m).where("subCategory","==",oldS).get();
                const b = db.batch(); ps.forEach(d => b.update(d.ref, {subCategory: newS}));
                await b.commit();
                endProgress();
                showToast("تم التعديل! ✅");
                init();
            }
        };

        let currentImgUrls = [];

        window.renderEditImages = () => {
            const container = document.getElementById('editPrevContainer');
            if(currentImgUrls.length === 0) {
                container.innerHTML = '<span style="color:#888;">لا توجد صور حالية.</span>';
                return;
            }
            container.innerHTML = currentImgUrls.map((url, index) => `
                <div class="edit-img-wrap">
                    <img src="${url}">
                    <button class="delete-img-btn" onclick="removeExistingImg(event, ${index})">×</button>
                </div>
            `).join('');
        };

        window.removeExistingImg = (event, index) => {
            event.stopPropagation();
            if(confirm("هل أنت متأكد من إزالة هذه الصورة؟")) {
                currentImgUrls.splice(index, 1);
                renderEditImages();
            }
        };

        window.openEdit = (id, n, m, s, imgUrlsStr) => {
            document.getElementById('editModal').classList.add('active');
            document.getElementById('editId').value = id; 
            document.getElementById('editName').value = n;
            document.getElementById('editMainCat').value = m; 
            
            currentImgUrls = JSON.parse(decodeURIComponent(imgUrlsStr));
            renderEditImages(); 
            
            document.getElementById('newEditPrevContainer').innerHTML = '';
            document.getElementById('editFile').value = '';
            document.getElementById('editDZ').classList.remove('has-img');
            
            loadSubCats('editMainCat', 'editSubCat', s);
        };
        
        window.closeModal = () => document.getElementById('editModal').classList.remove('active');

        async function updateProduct() {
            const id = document.getElementById('editId').value;
            const n = document.getElementById('editName').value;
            const m = document.getElementById('editMainCat').value;
            const s = document.getElementById('editSubCat').value;
            const files = document.getElementById('editFile').files;
            
            await startProgress();
            let finalUrlsToSave = [...currentImgUrls]; 
            
            if(files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    let url = await up(files[i]);
                    finalUrlsToSave.push(url);
                }
            }
            
            if(finalUrlsToSave.length === 0) {
                endProgress();
                alert("يجب أن يحتوي المنتج على صورة واحدة على الأقل!");
                return;
            }
            
            await db.collection("products").doc(id).update({ 
                name: n, mainCategory: m, subCategory: s || "عام", imageURLs: finalUrlsToSave 
            });
            
            endProgress();
            closeModal();
            showToast("تم حفظ التعديلات بنجاح! ✅");
            init();
        }

        window.delP = async (id) => { if(confirm("حذف المنتج؟")) { await db.collection("products").doc(id).delete(); showToast("تم الحذف 🗑️"); init(); } };
        window.delC = async (id) => { if(confirm("حذف القسم وتصنيفاته الفرعية؟ (المنتجات ستبقى بدون قسم)")) { await db.collection("categories").doc(id).delete(); showToast("تم الحذف 🗑️"); init(); } };
        window.delS = async (m, s) => { if(confirm("حذف الفرعي؟")) { await db.collection("categories").doc(m).update({ subs: firebase.firestore.FieldValue.arrayRemove(s) }); showToast("تم الحذف 🗑️"); init(); } };

        window.switchTab = (e, id) => {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if(e) e.target.classList.add('active');
            else document.getElementById('btnProductsTab').classList.add('active');
            document.getElementById(id).classList.add('active');
        };

        let siteCategories = {};
        
        async function init() {
            // جلب الأقسام
            const cSnap = await db.collection("categories").get();
            let catsArray = [];
            cSnap.forEach(doc => {
                let data = doc.data();
                data.id = doc.id;
                catsArray.push(data);
                siteCategories[doc.id] = data;
            });
            // ترتيب الأقسام حسب حقل order
            catsArray.sort((a, b) => (a.order || 0) - (b.order || 0));

            // تعبئة قوائم الاختيار (Select)
            const pM = document.getElementById('productMainCat'), sM = document.getElementById('mainCatForSub'), eM = document.getElementById('editMainCat');
            pM.innerHTML = sM.innerHTML = eM.innerHTML = '<option value="">اختر القسم</option>';
            catsArray.forEach(cat => {
                const opt = `<option value="${cat.id}">${cat.id}</option>`;
                pM.innerHTML += opt; sM.innerHTML += opt; eM.innerHTML += opt;
            });

            // 1. بناء صفحة التصنيفات (الأوكارديون + السحب)
            const cL = document.getElementById('categoriesAdminList');
            let cHTML = '';
            catsArray.forEach(cat => {
                let subsHTML = cat.subs.map(s => `
                    <div class="sub-tag">
                        <span>${s}</span>
                        <div>
                            <button onclick="editSub('${cat.id}','${s}')" style="background:none; border:none; color:var(--primary); font-size:18px; margin-left:10px;">✎</button>
                            <button onclick="delS('${cat.id}','${s}')" style="background:none; border:none; color:red; font-size:18px;">×</button>
                        </div>
                    </div>
                `).join('');
                
                if(subsHTML === '') subsHTML = '<p style="color:#666; font-size:14px;">لا توجد تصنيفات فرعية</p>';

                cHTML += `
                <div class="cat-sort-item" data-id="${cat.id}">
                    <div class="accordion-header" onclick="toggleAccordion(this, 'cat-acc')">
                        <div style="display:flex; align-items:center;">
                            <span class="drag-handle" title="اسحب لترتيب القسم">☰</span>
                            <img src="${cat.imageUrl}" style="width:40px; height:40px; border-radius:5px; object-fit:cover; margin-left:10px;">
                            <strong>${cat.id}</strong>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="accordion-content cat-acc">
                        ${subsHTML}
                        <button class="danger-btn" style="width:100%; padding:10px; margin-top:15px; border-radius:8px;" onclick="delC('${cat.id}')">حذف القسم بالكامل</button>
                    </div>
                </div>`;
            });
            cL.innerHTML = cHTML;

            // تفعيل السحب والإفلات للأقسام
            Sortable.create(cL, {
                handle: '.drag-handle',
                animation: 150,
                onEnd: async function () {
                    const items = document.querySelectorAll('.cat-sort-item');
                    const batch = db.batch();
                    items.forEach((item, index) => {
                        const id = item.getAttribute('data-id');
                        const ref = db.collection('categories').doc(id);
                        batch.update(ref, { order: index });
                    });
                    await batch.commit();
                    showToast("تم تحديث ترتيب الأقسام! ✅");
                }
            });

            // 2. بناء صفحة المنتجات (الأوكارديون المتداخل)
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            let allProducts = [];
            pSnap.forEach(doc => { let d = doc.data(); d.id = doc.id; allProducts.push(d); });

            const pL = document.getElementById('productsList');
            let pHTML = '';

            catsArray.forEach(cat => {
                // منتجات هذا القسم الرئيسي
                let catProds = allProducts.filter(p => p.mainCategory === cat.id);
                if(catProds.length === 0) return; // إذا كان القسم فارغاً، نتجاوزه في صفحة المنتجات

                let subsHTML = '';
                // الأقسام الفرعية التابعة له + "عام" للمنتجات اللي بدون فرعي
                let subsList = [...cat.subs, "عام"];
                
                subsList.forEach(sub => {
                    let subProds = catProds.filter(p => p.subCategory === sub || (!p.subCategory && sub === "عام"));
                    if(subProds.length === 0) return;

                    let prodsItemsHTML = subProds.map(p => {
                        const urls = p.imageURLs || (p.imageUrl ? [p.imageUrl] : []); 
                        const firstImg = urls.length > 0 ? urls[0] : 'https://via.placeholder.com/70';
                        const urlsStr = encodeURIComponent(JSON.stringify(urls));
                        return `
                        <div class="list-item">
                            <div class="item-row">
                                <img src="${firstImg}">
                                <div><strong>${p.name}</strong></div>
                            </div>
                            <div class="btn-group-large">
                                <button class="edit-btn" onclick="openEdit('${p.id}','${p.name}','${p.mainCategory}','${p.subCategory}','${urlsStr}')">تعديل</button>
                                <button class="danger-btn" onclick="delP('${p.id}')">حذف</button>
                            </div>
                        </div>`;
                    }).join('');

                    subsHTML += `
                    <div class="accordion-header sub-header" onclick="toggleAccordion(this, 'sub-acc-${cat.id}')">
                        <strong>↳ ${sub}</strong> <span class="arrow">▼</span>
                    </div>
                    <div class="accordion-content sub-content sub-acc-${cat.id}">
                        ${prodsItemsHTML}
                    </div>`;
                });

                pHTML += `
                <div style="margin-bottom:10px;">
                    <div class="accordion-header" onclick="toggleAccordion(this, 'prod-acc')">
                        <strong>📁 ${cat.id}</strong> <span class="arrow">▼</span>
                    </div>
                    <div class="accordion-content prod-acc" style="padding: 10px;">
                        ${subsHTML}
                    </div>
                </div>`;
            });
            
            pL.innerHTML = pHTML || '<p style="text-align:center; color:#888;">لا توجد منتجات حالياً.</p>';
        }
    </script>
</body>
</html>
