<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | المعرض</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* المتغيرات الأساسية */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #222222;
        }

        /* إعادة ضبط عامة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* =========================================
           الهيدر (شريط التنقل)
           ========================================= */
        header {
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            height: 40px; /* حجم معقول جداً */
            object-fit: contain;
        }

        .header-whatsapp {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .header-whatsapp:hover {
            background-color: var(--text-main);
            color: #000000;
        }

        /* =========================================
           الحاوية الرئيسية
           ========================================= */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* =========================================
           شبكة العرض (للتصنيفات والمنتجات)
           ========================================= */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* بطاقة التصنيف */
        .cat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cat-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }

        .cat-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .cat-card h3 {
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* =========================================
           قسم المنتجات
           ========================================= */
        #products-section {
            display: none;
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .btn-back {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-back:hover {
            background-color: var(--border-color);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--text-main);
            color: #000;
        }

        /* بطاقة المنتج */
        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .product-card h4 {
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .product-whatsapp {
            display: block;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .product-whatsapp:hover {
            background-color: var(--text-main);
            color: #000;
        }

        /* استجابة الجوال */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .products-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .cat-card h3, .product-card h4 {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/XftPtTSg/image.png" alt="ATHNTA Logo" class="logo" onclick="location.reload()" style="cursor:pointer;">
        <a href="https://wa.me/966552125258" class="header-whatsapp" target="_blank">واتساب</a>
    </header>

    <main class="container">
        
        <section id="categories-section">
            <h1 class="section-title">أعمالنا المنفذة</h1>
            <div class="grid" id="categories-grid">
                </div>
        </section>

        <section id="products-section">
            <div class="products-header">
                <h2 id="category-title">اسم القسم</h2>
                <button class="btn-back" onclick="location.reload()">العودة للأقسام</button>
            </div>
            
            <div class="filters" id="filters-container">
                </div>
            
            <div class="grid" id="products-grid">
                </div>
        </section>

    </main>

    <script>
        // إعدادات قاعدة البيانات
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  

        // التحقق من الروابط
        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/400x400/222/fff?text=Image';
        }

        // 1. جلب وعرض البيانات عند تحميل الصفحة
        async function loadData() {
            const catGrid = document.getElementById('categories-grid');
            
            try {
                // جلب الأقسام
                const cSnap = await db.collection("categories").get();
                catGrid.innerHTML = ''; 

                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    
                    catGrid.innerHTML += `
                        <div class="cat-card" onclick="showProducts('${doc.id}')">
                            <img src="${formatURL(data.imageUrl)}" alt="${doc.id}">
                            <h3>${doc.id}</h3>
                        </div>
                    `;
                });

                // جلب المنتجات دفعة واحدة
                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                catGrid.innerHTML = '<p>حدث خطأ في جلب البيانات.</p>';
                console.error(error);
            }
        }

        // 2. إخفاء الأقسام وإظهار منتجات القسم المختار
        window.showProducts = (categoryId) => {
            document.getElementById('categories-section').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-title').innerText = categoryId;
            
            // إنشاء أزرار الفلترة الفرعية
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterData('${categoryId}', 'all', event)">الكل</button>`;
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterData('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }

            filterData(categoryId, 'all');
            window.scrollTo(0, 0);
        }

        // 3. فلترة المنتجات بناءً على القسم الرئيسي والفرعي
        window.filterData = (mainCat, subCat, event) => {
            // تفعيل لون الزر المضغوط
            if(event) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            // تصفية المصفوفة
            let filtered = allProducts.filter(p => p.mainCategory === mainCat);
            if(subCat !== 'all') {
                filtered = filtered.filter(p => p.subCategory === subCat);
            }

            // رسم المنتجات
            const prodGrid = document.getElementById('products-grid');
            
            if(filtered.length === 0) {
                prodGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">لا توجد منتجات هنا.</p>';
                return;
            }

            prodGrid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${formatURL(p.imageUrl)}" loading="lazy" alt="${p.name}">
                    <h4>${p.name}</h4>
                    <a href="https://wa.me/966552125258?text=استفسار عن: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                        طلب استفسار
                    </a>
                </div>
            `).join('');
        }

        // تشغيل الدالة الأولى عند فتح الموقع
        loadData();
    </script>
</body>
</html>
