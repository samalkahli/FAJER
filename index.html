<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | المعرض</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* المتغيرات الأساسية الفخمة */
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before, body::after { content: ''; position: fixed; width: 40vw; height: 40vw; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 60%); z-index: -1; animation: float 15s infinite ease-in-out alternate; }
        body::before { top: -10%; right: -10%; }
        body::after { bottom: -10%; left: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* =========================================
           تصميم الهيدر الجديد (Profile Style)
           ========================================= */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease;
        }
        
        .profile-logo {
            width: 25vw; /* العرض يتغير نسبياً مع حجم الشاشة */
            max-width: 150px; /* أقصى حجم للشاشات الكبيرة */
            min-width: 90px; /* أصغر حجم للجوالات */
            height: auto; /* يحافظ على أبعاد الشعار الأصلية بدون تمطيط */
            margin-bottom: 15px;
            padding: 5px;
        }

        .profile-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to left, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-divider {
            width: 60px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 10px auto;
            border-radius: 2px;
        }

        .profile-subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .social-btn:hover {
            background: var(--text-main);
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.2);
        }

        .social-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* =========================================
           الشبكات والتصنيفات
           ========================================= */
        .section-title { text-align: center; margin-bottom: 30px; font-size: 1.8rem; font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; display: inline-block; width: 100%; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr) !important; gap: 20px; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; box-shadow: var(--glass-shadow); position: relative; }
        
        .cat-card { cursor: pointer; aspect-ratio: 3/4; }
        .cat-card .image-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .cat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.55); z-index: 1; transition: background 0.4s ease; }
        .cat-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .cat-card:hover::before { background: rgba(0, 0, 0, 0.7); }
        .cat-card:hover img { transform: scale(1.08); }
        .cat-card h3 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; color: #fff; text-align: center; font-size: 1.4rem; font-weight: 700; width: 90%; text-shadow: 0 4px 15px rgba(0,0,0,0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cat-card:hover h3 { transform: translate(-50%, calc(-50% + 15px)); }

        #products-section { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        #category-title { font-size: 1.8rem; font-weight: 700; }
        .btn-back { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.95rem; backdrop-filter: blur(5px); transition: 0.3s; }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); }
        
        /* الفلاتر والقائمة المنسدلة */
        .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; justify-content: center; align-items: center; }
        .filter-btn { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: var(--text-main); color: #000; border-color: var(--text-main); }
        
        .more-filters-container { position: relative; display: inline-block; }
        .more-filters-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 10px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 10px; flex-direction: column; gap: 8px; z-index: 50; min-width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .more-filters-dropdown.show { display: flex; animation: fadeIn 0.2s; }
        .dropdown-item { width: 100%; text-align: center; border: none; background: transparent; padding: 8px; }
        .dropdown-item:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* كروت المنتجات */
        .product-card { display: flex; flex-direction: column; align-items: center; padding-bottom: 15px; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        .product-card .image-container { width: 100%; aspect-ratio: 3/4; overflow: hidden; border-bottom: 1px solid var(--glass-border); position: relative; cursor: pointer; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
        
        .multi-img-icon { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 8px; border-radius: 8px; display: flex; align-items: center; gap: 5px; backdrop-filter: blur(4px); font-size: 0.75rem; color: #fff; z-index: 2;}
        .multi-img-icon svg { width: 14px; height: 14px; fill: #fff; }

        .hover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; z-index: 1;}
        .hover-overlay span { border: 1px solid #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; backdrop-filter: blur(2px); }
        .product-card .image-container:hover .hover-overlay { opacity: 1; }

        .product-card h4 { font-size: 1rem; margin: 15px 10px; font-weight: 500; text-align: center; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-whatsapp { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 20px; text-decoration: none; border-radius: 30px; font-size: 0.85rem; width: 85%; text-align: center; margin-top: auto; transition: 0.3s; }
        .product-whatsapp:hover { background: var(--text-main); color: #000; transform: scale(1.05); }

        /* =========================================
           النافذة المنبثقة للمنتج (Modal)
           ========================================= */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(15, 15, 15, 0.95); width: 100%; max-width: 450px; border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.7); }
        .close-modal { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 22px; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; transition: 0.3s; backdrop-filter: blur(5px); }
        .close-modal:hover { background: #ff4d4d; }
        
        .modal-body { display: flex; flex-direction: column; gap: 15px; }
        .modalSwiper { width: 100%; aspect-ratio: 3/4; border-radius: 12px; background: #000; overflow: hidden; }
        .modalSwiper img { width: 100%; height: 100%; object-fit: contain; }
        
        .modal-title { text-align: center; font-size: 1.4rem; font-weight: 700; margin-top: 5px; color: #fff; }
        
        .modal-whatsapp-btn { display: flex; justify-content: center; align-items: center; gap: 10px; background: linear-gradient(135deg, #25D366, #128C7E); color: #fff; padding: 12px 20px; border-radius: 30px; text-decoration: none; font-size: 1.1rem; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); margin-top: 5px; }
        .modal-whatsapp-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5); }
        .modal-whatsapp-btn svg { width: 24px; height: 24px; fill: currentColor; }

        .swiper-button-next, .swiper-button-prev { color: rgba(255,255,255,0.9) !important; background: rgba(0,0,0,0.4); width: 35px !important; height: 35px !important; border-radius: 50%; backdrop-filter: blur(4px); }
        .swiper-button-next::after, .swiper-button-prev::after { font-size: 16px !important; font-weight: bold; }
        .swiper-pagination-bullet { background: #fff !important; opacity: 0.5; }
        .swiper-pagination-bullet-active { opacity: 1; }

        @media (max-width: 768px) {
            .grid { gap: 8px; }
            .container { padding: 30px 10px; }
            .profile-title { font-size: 1.5rem; }
            .section-title { font-size: 1.4rem; }
            .cat-card h3 { font-size: 0.85rem; }
            .cat-card:hover h3 { transform: translate(-50%, calc(-50% + 8px)); }
            .product-card h4 { font-size: 0.75rem; margin: 10px 5px; }
            .product-whatsapp { padding: 6px 10px; width: 90%; font-size: 0.75rem; }
            .products-header { flex-direction: column; gap: 15px; }
            #category-title { font-size: 1.4rem; }
            .swiper-button-next, .swiper-button-prev { display: none; }
        }
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  
        let modalSwiperInstance = null; 

        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/400x400/222/fff?text=Image';
        }

        async function loadData() {
            const catGrid = document.getElementById('categories-grid');
            try {
                const cSnap = await db.collection("categories").get();
                catGrid.innerHTML = ''; 
                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    catGrid.innerHTML += `
                        <div class="glass-card cat-card" onclick="showProducts('${doc.id}')">
                            <div class="image-container">
                                <img src="${formatURL(data.imageUrl)}" alt="${doc.id}">
                            </div>
                            <h3>${doc.id}</h3>
                        </div>
                    `;
                });

                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                catGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">حدث خطأ في جلب البيانات.</p>';
                console.error(error);
            }
        }

        // ==========================================
        // وظائف الفلاتر والقائمة المنسدلة
        // ==========================================
        window.toggleMoreFilters = (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('moreFiltersDropdown');
            dropdown.classList.toggle('show');
        }

        window.closeMoreFilters = () => {
            const dropdown = document.getElementById('moreFiltersDropdown');
            if(dropdown) dropdown.classList.remove('show');
        }

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', closeMoreFilters);

        window.showProducts = (categoryId) => {
            // إخفاء الهيدر التعريفي والتصنيفات
            document.querySelector('.profile-header').style.display = 'none';
            document.getElementById('categories-section').style.display = 'none';
            
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            
            // بناء أزرار الفلترة: أول 3 أزرار تظهر مباشرة، والباقي في القائمة المنسدلة
            let filtersHTML = `<button class="filter-btn active" onclick="filterData('${categoryId}', 'all', event)">الكل</button>`;
            let subs = [];
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                subs = categoriesData[categoryId].subs;
            }

            subs.forEach((sub, index) => {
                if(index < 3) {
                    filtersHTML += `<button class="filter-btn" onclick="filterData('${categoryId}', '${sub}', event)">${sub}</button>`;
                }
            });

            // إذا كان هناك أكثر من 3 تصنيفات، نضع الباقي في قائمة منسدلة
            if(subs.length > 3) {
                filtersHTML += `
                <div class="more-filters-container">
                    <button class="filter-btn" onclick="toggleMoreFilters(event)">المزيد ▾</button>
                    <div id="moreFiltersDropdown" class="more-filters-dropdown">
                `;
                for(let i = 3; i < subs.length; i++) {
                    filtersHTML += `<button class="filter-btn dropdown-item" onclick="filterData('${categoryId}', '${subs[i]}', event)">${subs[i]}</button>`;
                }
                filtersHTML += `</div></div>`;
            }

            filtersBox.innerHTML = filtersHTML;

            filterData(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filterData = (mainCat, subCat, event) => {
            if(event) {
                // تلوين الزر النشط فقط للزر المضغوط (وإزالة اللون من الباقي)
                document.querySelectorAll('.filter-btn:not(.dropdown-item)').forEach(btn => btn.classList.remove('active'));
                
                // إذا تم الضغط على عنصر داخل القائمة المنسدلة، نغلقها ونفعل الزر الرئيسي "المزيد" مؤقتاً
                if(event.target.classList.contains('dropdown-item')) {
                    document.querySelector('.more-filters-container > button').classList.add('active');
                } else {
                    event.target.classList.add('active');
                }
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCat);
            if(subCat !== 'all') {
                filtered = filtered.filter(p => p.subCategory === subCat);
            }

            const prodGrid = document.getElementById('products-grid');
            
            if(filtered.length === 0) {
                prodGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 1.2rem;">لا توجد منتجات هنا حالياً.</p>';
                return;
            }

            prodGrid.innerHTML = filtered.map((p) => {
                let urls = p.imageURLs || (p.imageUrl ? [p.imageUrl] : []); 
                const firstImg = urls.length > 0 ? urls[0] : 'https://via.placeholder.com/400';
                
                const iconMultiple = urls.length > 1 ? `
                    <div class="multi-img-icon">
                        <svg viewBox="0 0 24 24"><path d="M22 4h-14c-1.103 0-2 .897-2 2v14c0 1.103.897 2 2 2h14c1.103 0 2-.897 2-2v-14c0-1.103-.897-2-2-2zm-2.586 11l-2.707-2.707c-.391-.391-1.023-.391-1.414 0l-1.293 1.293-3.293-3.293c-.391-.391-1.023-.391-1.414 0l-3.293 3.293v-8.586h14v10zm-13.414-13h14v2h-14v-2zm-4 4h2v14h-14v-14z"/></svg>
                        ${urls.length}
                    </div>` : '';

                const pStr = encodeURIComponent(JSON.stringify(p));

                return `
                    <div class="glass-card product-card">
                        <div class="image-container" onclick="openProductModal('${pStr}')">
                            <img src="${formatURL(firstImg)}" loading="lazy" alt="${p.name}">
                            ${iconMultiple}
                            <div class="hover-overlay"><span>عرض التفاصيل</span></div>
                        </div>
                        <h4>${p.name}</h4>
                        <a href="https://wa.me/966552125258?text=استفسار عن: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                            استفسار
                        </a>
                    </div>
                `;
            }).join('');
        }

        // ==========================================
        // وظائف النافذة المنبثقة (Popup Modal)
        // ==========================================
        window.openProductModal = (pStr) => {
            const p = JSON.parse(decodeURIComponent(pStr));
            let urls = p.imageURLs || (p.imageUrl ? [p.imageUrl] : []); 

            const wrapper = document.getElementById('modalSwiperWrapper');
            wrapper.innerHTML = urls.map(u => `
                <div class="swiper-slide">
                    <img src="${formatURL(u)}" alt="${p.name}">
                </div>
            `).join('');

            document.getElementById('modalProductTitle').innerText = p.name;
            
            const msg = `السلام عليكم، أود الطلب/الاستفسار عن المنتج: ${p.name} الموجود بقسم ${p.mainCategory}`;
            document.getElementById('modalWhatsappBtn').href = `https://wa.me/966552125258?text=${encodeURIComponent(msg)}`;

            document.getElementById('productModal').classList.add('active');

            if(modalSwiperInstance) {
                modalSwiperInstance.destroy(true, true);
            }
            
            modalSwiperInstance = new Swiper(".modalSwiper", {
                navigation: {
                    nextEl: ".swiper-button-next",
                    prevEl: ".swiper-button-prev",
                },
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
                grabCursor: true,
                loop: urls.length > 1 
            });
        };

        window.closeProductModal = () => {
            document.getElementById('productModal').classList.remove('active');
        };

        document.getElementById('productModal').addEventListener('click', function(e) {
            if(e.target === this) closeProductModal();
        });

        loadData();
    </script>
</body>
</html>
