<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | العراقة والحداثة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --off-white: #fdfdfc;
            --pure-white: #ffffff;
            --deep-black: #121212;
            --gold: #c5a059; /* ذهبي ملكي مطفي */
            --silver: #e0e0e0; /* فضي ناعم */
            --text-gray: #4a4a4a;
        }

        body {
            font-family: 'Times New Roman', serif;
            background-color: var(--off-white);
            color: var(--deep-black);
            margin: 0;
            overflow-x: hidden;
        }

        /* الهيدر الأنيق */
        header {
            padding: 50px 20px;
            background: var(--pure-white);
            text-align: center;
            border-bottom: 1px solid var(--silver);
        }

        .logo {
            height: 110px;
            filter: grayscale(0.2);
            transition: 0.5s;
        }

        /* شبكة التصنيفات الكلاسيكية */
        .home-categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 15px;
        }

        @media (min-width: 768px) {
            .home-categories { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        }

        .cat-card {
            position: relative;
            background: var(--pure-white);
            border-radius: 4px; /* زوايا حادة قليلاً تعطي طابع كلاسيكي */
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1.2;
            border: 1px solid var(--silver);
            transition: 0.4s;
        }

        .cat-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.1); /* لمسة دافئة للصور */
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(18,18,18,0.8) 0%, transparent 50%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
        }

        .cat-overlay h2 {
            color: var(--off-white);
            font-size: 1.2rem;
            margin: 0;
            font-weight: 300;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 5px;
        }

        /* أزرار الأقسام الفرعية */
        .sub-cats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 30px 0;
            justify-content: center;
        }

        .sub-cats button {
            background: var(--pure-white);
            border: 1px solid var(--silver);
            color: var(--text-gray);
            padding: 10px 25px;
            border-radius: 0;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .sub-cats button.active {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--deep-black);
            font-weight: bold;
        }

        /* المعرض */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        }

        .item {
            background: var(--pure-white);
            border: 1px solid var(--silver);
            padding: 10px;
            transition: 0.3s;
        }

        .item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .item h3 {
            text-align: center;
            font-size: 0.95rem;
            color: var(--deep-black);
            margin-top: 15px;
            font-weight: 400;
        }

        .back-btn {
            background: var(--deep-black);
            color: var(--silver);
            border: none;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .section-title {
            text-align: center;
            color: var(--deep-black);
            margin: 40px 0 10px 0;
        }
        
        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 1px;
            background: var(--gold);
            margin: 10px auto;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo" onclick="location.reload()">
    </header>

    <div id="home-view">
        <h2 class="section-title">المجموعات المختارة</h2>
        <div class="home-categories" id="home"></div>
    </div>

    <div class="products-view" id="products-view" style="display:none; padding:20px; max-width:1200px; margin:0 auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="cat-title" style="margin:0; font-weight: 300; letter-spacing: 1px;"></h2>
            <button onclick="location.reload()" class="back-btn">العودة</button>
        </div>
        <div class="sub-cats" id="subs-container"></div>
        <div class="gallery" id="gallery-container"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allProducts = [], allCats = {};

        async function init() {
            const cSnap = await db.collection("categories").get();
            const home = document.getElementById('home');
            cSnap.forEach(doc => {
                allCats[doc.id] = doc.data();
                home.innerHTML += `
                    <div class="cat-card" onclick="showCategory('${doc.id}')">
                        <img src="${doc.data().imageUrl}">
                        <div class="cat-overlay"><h2>${doc.id}</h2></div>
                    </div>`;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => allProducts.push(doc.data()));
        }

        window.showCategory = (id) => {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('products-view').style.display = 'block';
            document.getElementById('cat-title').innerText = id;
            
            const subs = document.getElementById('subs-container');
            subs.innerHTML = `<button class="active" onclick="filter('${id}', 'all', event)">الكل</button>`;
            if(allCats[id].subs) {
                allCats[id].subs.forEach(s => subs.innerHTML += `<button onclick="filter('${id}', '${s}', event)">${s}</button>`);
            }
            filter(id, 'all');
            window.scrollTo(0,0);
        }

        window.filter = (main, sub, e) => {
            if(e) {
                document.querySelectorAll('.sub-cats button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            }
            let data = allProducts.filter(p => p.mainCategory === main);
            if(sub !== 'all') data = data.filter(p => p.subCategory === sub);
            
            document.getElementById('gallery-container').innerHTML = data.map(p => `
                <div class="item">
                    <img src="${p.imageUrl}">
                    <h3>${p.name}</h3>
                </div>`).join('');
        }
        init();
    </script>
</body>
</html>
