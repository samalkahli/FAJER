<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | المعرض</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* المتغيرات الأساسية الفخمة */
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-color: #d4af37; /* لون ذهبي خفيف للفخامة */
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }

        /* إعادة ضبط عامة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية حية مضيئة خلف الزجاج */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 60%);
            z-index: -1;
            animation: float 15s infinite ease-in-out alternate;
        }
        body::before { top: -10%; right: -10%; }
        body::after { bottom: -10%; left: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* =========================================
           الهيدر (شريط التنقل الزجاجي)
           ========================================= */
        header {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--glass-shadow);
        }

        .logo {
            height: 45px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }

        .header-whatsapp {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.0));
            backdrop-filter: blur(10px);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 8px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-whatsapp:hover {
            background: var(--text-main);
            color: #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* =========================================
           الحاوية الرئيسية
           ========================================= */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to left, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* =========================================
           شبكة العرض (للتصنيفات والمنتجات)
           ========================================= */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* البطاقات الزجاجية المشتركة */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .glass-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .glass-card:hover img {
            transform: scale(1.08);
        }

        .image-container {
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
        }

        .cat-card { cursor: pointer; }

        .cat-card h3 {
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* =========================================
           قسم المنتجات
           ========================================= */
        #products-section { display: none; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        #category-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .btn-back {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--text-main);
            color: #000;
            border-color: var(--text-main);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* تفاصيل بطاقة المنتج */
        .product-card {
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease backwards;
        }

        .product-card h4 {
            font-size: 1.1rem;
            margin: 20px 15px;
            font-weight: 500;
            text-align: center;
        }

        .product-whatsapp {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 80%;
            text-align: center;
            margin-top: auto;
        }

        .product-whatsapp:hover {
            background: var(--text-main);
            color: #000;
            transform: scale(1.05);
        }

        /* استجابة الجوال */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
            .products-header {
                flex-direction: column;
                gap: 20px;
            }
            .section-title { font-size: 1.5rem; }
            .cat-card h3, .product-card h4 { font-size: 1rem; }
            .product-whatsapp { padding: 8px 15px; width: 90%; font-size: 0.85rem;}
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/XftPtTSg/image.png" alt="ATHNTA Logo" class="logo" onclick="location.reload()" style="cursor:pointer;">
        <a href="https://wa.me/966552125258" class="header-whatsapp" target="_blank">تواصل معنا</a>
    </header>

    <main class="container">
        
        <section id="categories-section">
            <h1 class="section-title">أعمالنا المنفذة</h1>
            <div class="grid" id="categories-grid">
                </div>
        </section>

        <section id="products-section">
            <div class="products-header">
                <h2 id="category-title">اسم القسم</h2>
                <button class="btn-back" onclick="location.reload()">العودة للأقسام</button>
            </div>
            
            <div class="filters" id="filters-container">
                </div>
            
            <div class="grid" id="products-grid">
                </div>
        </section>

    </main>

    <script>
        // إعدادات قاعدة البيانات
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  

        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/400x400/222/fff?text=Image';
        }

        async function loadData() {
            const catGrid = document.getElementById('categories-grid');
            
            try {
                const cSnap = await db.collection("categories").get();
                catGrid.innerHTML = ''; 

                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    
                    catGrid.innerHTML += `
                        <div class="glass-card cat-card" onclick="showProducts('${doc.id}')">
                            <div class="image-container">
                                <img src="${formatURL(data.imageUrl)}" alt="${doc.id}">
                            </div>
                            <h3>${doc.id}</h3>
                        </div>
                    `;
                });

                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                catGrid.innerHTML = '<p style="text-align:center;">حدث خطأ في جلب البيانات.</p>';
                console.error(error);
            }
        }

        window.showProducts = (categoryId) => {
            document.getElementById('categories-section').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterData('${categoryId}', 'all', event)">الكل</button>`;
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterData('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }

            filterData(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filterData = (mainCat, subCat, event) => {
            if(event) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCat);
            if(subCat !== 'all') {
                filtered = filtered.filter(p => p.subCategory === subCat);
            }

            const prodGrid = document.getElementById('products-grid');
            
            if(filtered.length === 0) {
                prodGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 1.2rem;">لا توجد منتجات هنا حالياً.</p>';
                return;
            }

            // إضافة delay بسيط للانيميشن لكل كرت
            prodGrid.innerHTML = filtered.map((p, index) => `
                <div class="glass-card product-card" style="animation-delay: ${index * 0.05}s">
                    <div class="image-container" style="width: 100%;">
                        <img src="${formatURL(p.imageUrl)}" loading="lazy" alt="${p.name}">
                    </div>
                    <h4>${p.name}</h4>
                    <a href="https://wa.me/966552125258?text=استفسار عن: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                        طلب استفسار
                    </a>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
