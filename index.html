<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA - معرض الفخامة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --primary: #cba26a; --background: #101010; --card-bg: #1a1a1a; --text-main: #ffffff; }
        body { font-family: 'Times New Roman', serif; background: var(--background); margin: 0; color: var(--text-main); overflow-x: hidden; }
        
        header { text-align: center; padding: 30px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { height: 70px; cursor: pointer; filter: drop-shadow(0 0 5px var(--primary)); max-width: 100%; object-fit: contain; }

        /* تعديل شبكة التصنيفات لتصبح 2 في كل صف بالجوال */
        .home-categories { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* تجعلها 2 بجانب بعض افتراضياً */
            gap: 12px; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 15px; 
        }

        /* في الشاشات الكبيرة (الكمبيوتر) ترجع 3 أو 4 بجانب بعض */
        @media (min-width: 768px) {
            .home-categories { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
            .logo { height: 90px; }
        }

        .cat-card { position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; aspect-ratio: 1/1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .cat-card:hover img { transform: scale(1.1); }
        .cat-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); display: flex; align-items: flex-end; justify-content: center; padding: 10px; }
        .cat-overlay h2 { margin: 0; color: var(--primary); font-size: 1.1rem; text-align: center; text-shadow: 0 2px 4px #000; }

        /* شاشة عرض المنتجات */
        .products-view { display: none; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .products-view.active { display: block; animation: fadeIn 0.4s; }
        
        .sub-cats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; justify-content: center; }
        .sub-cats button { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .sub-cats button.active { background: var(--primary); color: #000; font-weight: bold; }

        /* شبكة المنتجات تصبح أيضاً 2 بجانب بعض في الجوال */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }

        @media (min-width: 768px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        }

        .item { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .item h3 { padding: 10px; text-align: center; margin: 0; font-size: 0.9rem; font-weight: normal; color: #eee; }

        .back-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <header><img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo" onclick="location.reload()"></header>
    
    <div class="home-categories" id="home"></div>

    <div class="products-view" id="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="title" style="color:var(--primary); font-size: 1.3rem; margin:0;"></h2>
            <button onclick="location.reload()" class="back-btn">عودة</button>
        </div>
        <div class="sub-cats" id="subs"></div>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let prods = [], cats = {};

        async function start() {
            const cSnap = await db.collection("categories").get();
            const homeBox = document.getElementById('home');
            cSnap.forEach(doc => {
                cats[doc.id] = doc.data();
                homeBox.innerHTML += `
                    <div class="cat-card" onclick="openCat('${doc.id}')">
                        <img src="${doc.data().imageUrl}" loading="lazy">
                        <div class="cat-overlay"><h2>${doc.id}</h2></div>
                    </div>`;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => prods.push(doc.data()));
        }

        window.openCat = (id) => {
            document.getElementById('home').style.display = 'none';
            document.getElementById('view').classList.add('active');
            document.getElementById('title').innerText = id;
            const subBox = document.getElementById('subs');
            subBox.innerHTML = `<button class="active" onclick="filter('${id}', 'all', event)">الكل</button>`;
            if(cats[id].subs) {
                cats[id].subs.forEach(s => subBox.innerHTML += `<button onclick="filter('${id}', '${s}', event)">${s}</button>`);
            }
            filter(id, 'all');
            window.scrollTo(0,0);
        }

        window.filter = (main, sub, e) => {
            if(e) { document.querySelectorAll('.sub-cats button').forEach(b=>b.classList.remove('active')); e.target.classList.add('active'); }
            let f = prods.filter(p => p.mainCategory === main);
            if(sub !== 'all') f = f.filter(p => p.subCategory === sub);
            document.getElementById('gallery').innerHTML = f.map(p => `
                <div class="item">
                    <img src="${p.imageUrl}" loading="lazy">
                    <h3>${p.name}</h3>
                </div>`).join('');
        }
        start();
    </script>
</body>
</html>
