<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | عراقة وفخامة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            /* باليت الألوان المعتمدة بتدرجات عميقة */
            --bg-deep-navy: #000814; /* كحلي مسود للعمق */
            --bg-main-navy: #001d3d; /* كحلي غني */
            --color-beige-glow: #e9d8c4; /* بيج متوهج ناعم */
            --color-beige-main: #dcc5a9; /* بيج رملي */
            
            /* تأثيرات الزجاج والوهج بالألوان الجديدة */
            --glass-bg: rgba(255, 255, 255, 0.02); /* زجاجي خفيف جداً */
            --glass-border: rgba(255, 255, 255, 0.06); /* حدود زجاجية */
            --accent-glow: rgba(233, 216, 196, 0.25); /* وهج بيج متطور */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            
            /* تدرج خلفية متحرك ومذهل */
            background: linear-gradient(-45deg, var(--bg-deep-navy), #00122e, #001d3d, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تنسيق الهيدر الفخم */
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            position: relative;
        }

        .logo {
            height: 100px;
            cursor: pointer;
            /* توهج بيج متطور خلف الشعار */
            filter: drop-shadow(0 0 15px var(--accent-glow));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo:hover {
            transform: scale(1.1) rotate(2deg);
        }

        /* رسالة ترحيبية متأنقة */
        .welcome-msg {
            text-align: center;
            margin: 0 0 50px;
            animation: fadeIn 1.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .welcome-msg h1 { font-weight: 300; letter-spacing: 4px; color: var(--color-beige-glow); margin-bottom: 5px; }
        .welcome-msg h1::after { content:''; display:block; width:50px; height:2px; background:var(--color-beige-main); margin: 10px auto; border-radius: 2px; }
        .welcome-msg p { color: #aaaaaa; font-size: 0.95rem; font-weight: 300; }

        /* شبكة التصنيفات الحيوية والتأثيرات الزجاجية */
        .home-categories {
            display: grid;
            /* الدعم الافتراضي 2 في الصف للجوال */
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* للشاشات الأكبر (الكمبيوتر) */
        @media (min-width: 768px) {
            .home-categories {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 30px;
            }
        }

        .cat-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 0.8 / 1;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px); /* تأثير الزجاج */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* تأثيرات التمرير القوية المعتمدة */
        .cat-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--color-beige-glow);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .cat-card:hover img {
            transform: scale(1.1);
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            /* تدرج غامق من الأسفل لإبراز النص */
            background: linear-gradient(to top, rgba(0,0,0,0.95) 5%, transparent 60%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 25px;
            text-align: center;
        }

        .cat-overlay h2 {
            margin: 0;
            color: var(--color-beige-glow);
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* شاشة عرض المنتجات المذهلة والحفاظ على الحركة */
        .products-view {
            display: none;
            padding: 20px;
            max-width: 1300px;
            margin: 0 auto;
            /* حركة الانزلاق للأعلى المعتمدة */
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .products-view.active { display: block; }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .back-btn {
            background: rgba(220, 197, 169, 0.1);
            border: 1px solid var(--color-beige-main);
            color: var(--color-beige-main);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--color-beige-main);
            color: #000;
        }

        /* أزرار الأقسام الفرعية بالألوان الجديدة */
        .sub-cats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 35px;
            justify-content: center;
        }

        .sub-cats button {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sub-cats button.active {
            background: var(--color-beige-glow);
            border-color: var(--color-beige-glow);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* المعرض الحيوية */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 30px;
            }
        }

        .item {
            background: var(--glass-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .item:hover {
            border-color: var(--color-beige-main);
            transform: scale(1.03);
        }

        .item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .item h3 {
            padding: 15px;
            text-align: center;
            margin: 0;
            font-size: 1rem;
            color: #ddd;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo" onclick="location.reload()">
    </header>

    <div id="home-section">
        <div class="welcome-msg">
            <h1>ATHNTA</h1>
            <p>العراقة في كل تفصيل، الفخامة في كل اختيار</p>
        </div>
        <div class="home-categories" id="home"></div>
    </div>

    <div class="products-view" id="view">
        <div class="view-header">
            <h2 id="title" style="color:var(--color-beige-glow); margin:0;"></h2>
            <button onclick="location.reload()" class="back-btn">← العودة للرئيسية</button>
        </div>
        <div class="sub-cats" id="subs"></div>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let prods = [], cats = {};

        async function start() {
            const cSnap = await db.collection("categories").get();
            const homeBox = document.getElementById('home');
            cSnap.forEach(doc => {
                cats[doc.id] = doc.data();
                homeBox.innerHTML += `
                    <div class="cat-card" onclick="openCat('${doc.id}')">
                        <img src="${doc.data().imageUrl}" loading="lazy">
                        <div class="cat-overlay"><h2>${doc.id}</h2></div>
                    </div>`;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => prods.push(doc.data()));
        }

        window.openCat = (id) => {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('view').classList.add('active');
            document.getElementById('title').innerText = id;
            const subBox = document.getElementById('subs');
            subBox.innerHTML = `<button class="active" onclick="filter('${id}', 'all', event)">الكل</button>`;
            if(cats[id].subs) {
                cats[id].subs.forEach(s => subBox.innerHTML += `<button onclick="filter('${id}', '${s}', event)">${s}</button>`);
            }
            filter(id, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filter = (main, sub, e) => {
            if(e) { 
                document.querySelectorAll('.sub-cats button').forEach(b=>b.classList.remove('active')); 
                e.target.classList.add('active'); 
            }
            let filtered = prods.filter(p => p.mainCategory === main);
            if(sub !== 'all') filtered = filtered.filter(p => p.subCategory === sub);
            
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = filtered.map(p => `
                <div class="item">
                    <img src="${p.imageUrl}" loading="lazy">
                    <h3>${p.name}</h3>
                </div>`).join('');
        }
        start();
    </script>
</body>
</html>
