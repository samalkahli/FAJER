<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA - المعرض</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --primary: #cba26a; --background: #101010; --card-bg: #1a1a1a; --text-main: #ffffff; --text-muted: #aaaaaa; }
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; background: var(--background); margin: 0; color: var(--text-main); }
        
        header { text-align: center; padding: 40px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { height: 80px; max-width: 100%; margin-bottom: 15px; filter: drop-shadow(0 0 5px rgba(203, 162, 106, 0.5)); cursor: pointer; object-fit: contain;}
        h1 { margin: 0; font-size: 2.2rem; color: var(--primary); letter-spacing: 2px; }

        .home-categories { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .cat-card { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; aspect-ratio: 4/3; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .cat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(203, 162, 106, 0.3); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .cat-card:hover img { transform: scale(1.1); }
        .cat-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; align-items: flex-end; justify-content: center; padding: 20px; }
        .cat-overlay h2 { margin: 0; color: var(--primary); font-size: 1.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 1px;}

        .products-view { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .products-view.active { display: block; animation: fadeIn 0.5s; }
        
        .section-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(203,162,106,0.3); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;}
        .back-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .back-btn:hover { background: var(--primary); color: #000; }
        .section-title { font-size: 1.5rem; color: var(--primary); margin: 0; }

        .sub-cats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .sub-cats button { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-main); padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .sub-cats button.active, .sub-cats button:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .item { background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .item:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(203, 162, 106, 0.2); }
        .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .item h3 { margin: 0; padding: 15px; text-align: center; font-size: 16px; font-weight: normal; }

        #loading { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--primary); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" alt="ATHNTA Logo" class="logo" onclick="showHome()">
        <h1>معرض الفخامة</h1>
    </header>

    <div id="loading">جاري تحميل الفخامة... ⏳</div>

    <div class="home-categories" id="homeCategories"></div>

    <div class="products-view" id="productsView">
        <div class="section-header">
            <h2 class="section-title" id="currentSectionTitle">القسم</h2>
            <button class="back-btn" onclick="showHome()">➔ العودة للتصنيفات</button>
        </div>
        <div class="sub-cats" id="subCatsContainer"></div>
        <div class="gallery" id="galleryContainer"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCn7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = [];
        let siteCategories = {}; 

        async function initApp() {
            try {
                const catSnap = await db.collection("categories").get();
                const homeContainer = document.getElementById('homeCategories');
                
                catSnap.forEach(doc => {
                    const data = doc.data();
                    siteCategories[doc.id] = data; 
                    const catImage = data.imageUrl || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500';
                    
                    homeContainer.innerHTML += `
                        <div class="cat-card" onclick="openCategory('${doc.id}')">
                            <img src="${catImage}" loading="lazy">
                            <div class="cat-overlay"><h2>${doc.id}</h2></div>
                        </div>
                    `;
                });

                const prodSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                prodSnap.forEach(doc => allProducts.push(doc.data()));
                
                document.getElementById('loading').style.display = 'none';
            } catch (e) { alert("خطأ في التحميل: " + e.message); }
        }

        function showHome() {
            document.getElementById('homeCategories').style.display = 'grid';
            document.getElementById('productsView').classList.remove('active');
        }

        window.openCategory = function(mainCat) {
            document.getElementById('homeCategories').style.display = 'none';
            document.getElementById('productsView').classList.add('active');
            document.getElementById('currentSectionTitle').innerText = mainCat;

            const subContainer = document.getElementById('subCatsContainer');
            const subs = siteCategories[mainCat].subs || [];
            
            subContainer.innerHTML = `<button class="active" onclick="filterSub('${mainCat}', 'all', event)">عرض الكل</button>`;
            subs.forEach(sub => {
                subContainer.innerHTML += `<button onclick="filterSub('${mainCat}', '${sub}', event)">${sub}</button>`;
            });

            filterSub(mainCat, 'all', { target: subContainer.firstChild });
        }

        window.filterSub = function(mainCat, subCat, event) {
            if(event && event.target) {
                document.querySelectorAll('.sub-cats button').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCat);
            if(subCat !== 'all') {
                filtered = filtered.filter(p => p.subCategory === subCat);
            }

            const container = document.getElementById('galleryContainer');
            if(filtered.length === 0) {
                container.innerHTML = '<h3 style="grid-column: 1/-1; text-align:center; color:#777;">لا توجد تصاميم هنا حالياً.</h3>';
                return;
            }
            
            container.innerHTML = filtered.map(p => `
                <div class="item">
                    <img src="${p.imageUrl}" loading="lazy">
                    <h3>${p.name}</h3>
                </div>
            `).join('');
        }

        initApp();
    </script>
</body>
</html>
