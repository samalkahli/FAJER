<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | المعرض</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; min-height: 100vh; position: relative; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* =========================================
           الهيدر وتأثير البوكس العائم
           ========================================= */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 0;
            transition: 0.4s ease;
        }

        /* حاوية الشعار والواتساب العائمة */
        .nav-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 10px;
        }

        .profile-logo {
            width: 25vw;
            max-width: 150px;
            min-width: 80px;
            height: auto;
            transition: all 0.4s ease;
        }

        /* زر الواتساب داخل الهيدر (مخفي افتراضياً) */
        .nav-whatsapp {
            display: none;
            background: #25D366;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
        }

        /* ستايل البوكس البيضاوي العائم عند السكرول */
        .nav-box.sticky {
            position: fixed;
            top: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-box.sticky .profile-logo {
            width: 45px;
            min-width: 45px;
        }

        /* إظهار واتساب الهيدر فقط في وضع الـ Sticky */
        .nav-box.sticky .nav-whatsapp {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .profile-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 15px;
            font-weight: 400;
        }

        /* =========================================
           الشبكة والتصنيفات
           ========================================= */
        .section-title { text-align: center; margin: 30px 0; font-size: 1.6rem; font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; width: 100%; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; position: relative; }
        
        .cat-card { cursor: pointer; aspect-ratio: 3/4; }
        .cat-card .image-container { position: absolute; inset: 0; }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .cat-card h3 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; color: #fff; font-size: 1.2rem; text-align: center; width: 90%; }

        /* =========================================
           صفحة المنتجات
           ========================================= */
        #products-section { display: none; padding-top: 20px; }
        .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .btn-back { background: transparent; color: #fff; border: 1px solid var(--glass-border); padding: 7px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }

        .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; justify-content: center; }
        .filter-btn { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 7px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .filter-btn.active { background: #fff; color: #000; }

        .product-card { display: flex; flex-direction: column; padding-bottom: 10px; }
        .product-card .image-container { aspect-ratio: 3/4; cursor: pointer; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .product-card h4 { font-size: 0.9rem; margin: 10px 5px; text-align: center; }

        /* =========================================
           التواصل (Social Footer)
           ========================================= */
        .social-footer {
            margin-top: 50px;
            padding: 30px 0;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-btn svg { width: 25px; height: 25px; fill: #fff; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal-content { background: #111; width: 100%; max-width: 450px; border-radius: 20px; padding: 15px; position: relative; }
        .modalSwiper { width: 100%; aspect-ratio: 3/4; border-radius: 10px; overflow: hidden; }
        .modalSwiper img { width: 100%; height: 100%; object-fit: contain; }
        .modal-whatsapp-btn { display: flex; justify-content: center; align-items: center; gap: 10px; background: #25D366; color: #fff; padding: 12px; border-radius: 30px; text-decoration: none; margin-top: 15px; font-weight: bold; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .cat-card h3 { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <main class="container">
        <div class="profile-header">
            <div class="nav-box" id="mainNav">
                <img src="https://i.ibb.co/XftPtTSg/image.png" alt="Logo" class="profile-logo" onclick="location.reload()">
                <a href="https://wa.me/966552125258" class="nav-whatsapp" target="_blank">واتساب</a>
            </div>
            <p class="profile-subtitle" id="subHeader">نصنع قطع فنية 🧵</p>
        </div>

        <section id="categories-section">
            <h2 class="section-title">أعمالنا المنفذة</h2>
            <div class="grid" id="categories-grid"></div>
        </section>

        <section id="products-section">
            <div class="products-header">
                <h2 id="category-title">القسم</h2>
                <button class="btn-back" onclick="location.reload()">رجوع</button>
            </div>
            <div class="filters" id="filters-container"></div>
            <div class="grid" id="products-grid"></div>
        </section>

        <div class="social-footer">
            <a href="https://wa.me/966552125258" class="social-btn" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            </a>
            <a href="#" class="social-btn"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
            <a href="#" class="social-btn"><svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></a>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-body">
                <button style="position:absolute;top:10px;left:10px;z-index:10;background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;" onclick="closeProductModal()">×</button>
                <div class="swiper modalSwiper">
                    <div class="swiper-wrapper" id="modalSwiperWrapper"></div>
                    <div class="swiper-pagination"></div>
                </div>
                <h3 id="modalProductTitle" style="text-align:center;margin-top:15px;"></h3>
                <a id="modalWhatsappBtn" href="#" class="modal-whatsapp-btn" target="_blank">للطلب عبر الواتساب</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allProducts = [], categoriesData = {}, modalSwiperInstance = null;

        // مراقبة السكرول لتحويل الهيدر لبوكس عائم
        window.onscroll = function() {
            const nav = document.getElementById('mainNav');
            // التأثير يظهر فقط في صفحة المنتجات
            if (document.getElementById('products-section').style.display === 'block') {
                if (window.pageYOffset > 50) {
                    nav.classList.add('sticky');
                } else {
                    nav.classList.remove('sticky');
                }
            }
        };

        async function loadData() {
            const catGrid = document.getElementById('categories-grid');
            const cSnap = await db.collection("categories").get();
            cSnap.forEach(doc => {
                categoriesData[doc.id] = doc.data();
                catGrid.innerHTML += `
                    <div class="glass-card cat-card" onclick="showProducts('${doc.id}')">
                        <div class="image-container"><img src="${doc.data().imageUrl}"></div>
                        <h3>${doc.id}</h3>
                    </div>`;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => allProducts.push(doc.data()));
        }

        window.showProducts = (categoryId) => {
            document.getElementById('categories-section').style.display = 'none';
            document.getElementById('subHeader').style.display = 'none'; // إخفاء العبارة في صفحة المنتجات
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterData('${categoryId}', 'all', event)">الكل</button>`;
            if(categoriesData[categoryId].subs) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterData('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }
            filterData(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterData(mainCat, subCat, event) {
            if(event) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }
            let filtered = allProducts.filter(p => p.mainCategory === mainCat);
            if(subCat !== 'all') filtered = filtered.filter(p => p.subCategory === subCat);
            
            const pGrid = document.getElementById('products-grid');
            pGrid.innerHTML = filtered.map(p => `
                <div class="glass-card product-card" onclick="openProductModal('${encodeURIComponent(JSON.stringify(p))}')">
                    <div class="image-container"><img src="${p.imageURLs ? p.imageURLs[0] : p.imageUrl}"></div>
                    <h4>${p.name}</h4>
                </div>`).join('');
        }

        window.openProductModal = (pStr) => {
            const p = JSON.parse(decodeURIComponent(pStr));
            const urls = p.imageURLs || [p.imageUrl];
            document.getElementById('modalSwiperWrapper').innerHTML = urls.map(u => `<div class="swiper-slide"><img src="${u}"></div>`).join('');
            document.getElementById('modalProductTitle').innerText = p.name;
            document.getElementById('modalWhatsappBtn').href = `https://wa.me/966552125258?text=استفسار عن: ${p.name}`;
            document.getElementById('productModal').classList.add('active');
            if(modalSwiperInstance) modalSwiperInstance.destroy();
            modalSwiperInstance = new Swiper(".modalSwiper", { pagination: { el: ".swiper-pagination" }, loop: urls.length > 1 });
        };

        window.closeProductModal = () => document.getElementById('productModal').classList.remove('active');
        loadData();
    </script>
</body>
</html>
