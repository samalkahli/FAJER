<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | فخامة تنفيذية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-silver: #e5e5e5; /* فضي فاتح */
            --dark-black: #050505; /* أسود عميق */
            --glass-white: rgba(255, 255, 255, 0.08); /* أبيض شفاف للزجاج */
            --border-silver: rgba(192, 192, 192, 0.3); /* حدود فضية */
            --text-main: #ffffff;
            --accent-silver: #a8a8a8; /* فضي معدني */
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            background-color: var(--dark-black);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            overflow-x: hidden;
        }

        /* الهيدر المطور */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-silver);
        }

        .logo {
            height: 60px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
            cursor: pointer;
        }

        .whatsapp-header {
            display: flex;
            align-items: center;
            background: #ffffff;
            color: #000;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .whatsapp-header:hover {
            background: var(--primary-silver);
            transform: scale(1.05);
        }

        /* رسالة الترحيب */
        .welcome-msg {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome-msg h1 {
            font-weight: 200;
            letter-spacing: 8px;
            font-size: 3rem;
            margin: 0;
        }

        .welcome-msg p {
            color: var(--accent-silver);
            font-size: 1.1rem;
            margin-top: 10px;
            font-weight: 300;
        }

        /* شبكة التصنيفات الفخمة */
        .home-categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .cat-card {
            position: relative;
            height: 450px;
            border-radius: 0; /* شكل هندسي فخم */
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-silver);
            background: var(--glass-white);
            transition: all 0.5s ease;
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: grayscale(40%);
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        .cat-overlay h2 {
            font-weight: 400;
            letter-spacing: 3px;
            transition: transform 0.5s ease;
        }

        /* تأثير الحركة المطلوب عند التمرير */
        .cat-card:hover img {
            transform: scale(1.1);
            opacity: 1;
            filter: grayscale(0%);
        }

        .cat-card:hover .cat-overlay h2 {
            transform: translateY(20px); /* ينسحب لأسفل قليلاً عند التحديد */
            color: var(--primary-silver);
        }

        /* قسم المنتجات */
        .products-view {
            display: none;
            padding: 40px 5%;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-silver);
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .item:hover {
            border-color: #fff;
        }

        .item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .whatsapp-item-btn {
            display: inline-block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-silver);
            color: #fff;
            padding: 10px 0;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        .whatsapp-item-btn:hover {
            background: #fff;
            color: #000;
        }

        .back-btn {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
        }

        .sub-cats button {
            background: transparent;
            border: 1px solid var(--border-silver);
            color: #fff;
            padding: 8px 20px;
            margin: 5px;
            cursor: pointer;
        }

        .sub-cats button.active {
            background: #fff;
            color: #000;
        }

        @media (max-width: 768px) {
            .home-categories { grid-template-columns: 1fr; }
            .welcome-msg h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo" onclick="location.reload()">
        <a href="https://wa.me/966552125258" class="whatsapp-header">
            <span>تواصل معنا</span>
        </a>
    </header>

    <div id="home-section">
        <div class="welcome-msg">
            <h1>ATHNTA</h1>
            <p>أعمالنا المنفذة خصيصاً لكم</p>
        </div>
        <div class="home-categories" id="home"></div>
    </div>

    <div class="products-view" id="view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h2 id="title" style="margin:0; font-weight: 200; letter-spacing: 2px;"></h2>
            <button onclick="location.reload()" class="back-btn">العودة</button>
        </div>
        <div class="sub-cats" id="subs" style="margin-bottom: 30px; text-align: center;"></div>
        <div class="home-categories" id="gallery" style="padding-top:0;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let prods = [], cats = {};

        // دالة تظفير/تنظيف الروابط
        function formatURL(url) {
            try {
                const cleanURL = new URL(url);
                return cleanURL.href;
            } catch (e) {
                return '#';
            }
        }

        async function start() {
            const cSnap = await db.collection("categories").get();
            const homeBox = document.getElementById('home');
            cSnap.forEach(doc => {
                const data = doc.data();
                cats[doc.id] = data;
                homeBox.innerHTML += `
                    <div class="cat-card" onclick="openCat('${doc.id}')">
                        <img src="${formatURL(data.imageUrl)}" loading="lazy">
                        <div class="cat-overlay">
                            <h2>${doc.id}</h2>
                        </div>
                    </div>`;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => prods.push(doc.data()));
        }

        window.openCat = (id) => {
            document.getElementById('home-section').style.display = 'none';
            const view = document.getElementById('view');
            view.style.display = 'block';
            document.getElementById('title').innerText = id;
            const subBox = document.getElementById('subs');
            subBox.innerHTML = `<button class="active" onclick="filter('${id}', 'all', event)">الكل</button>`;
            if(cats[id].subs) {
                cats[id].subs.forEach(s => subBox.innerHTML += `<button onclick="filter('${id}', '${s}', event)">${s}</button>`);
            }
            filter(id, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filter = (main, sub, e) => {
            if(e) { 
                document.querySelectorAll('.sub-cats button').forEach(b=>b.classList.remove('active')); 
                e.target.classList.add('active'); 
            }
            let filtered = prods.filter(p => p.mainCategory === main);
            if(sub !== 'all') filtered = filtered.filter(p => p.subCategory === sub);
            
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = filtered.map(p => `
                <div class="item">
                    <img src="${formatURL(p.imageUrl)}" loading="lazy">
                    <h3 style="font-weight:400; font-size:1rem;">${p.name}</h3>
                    <a href="https://wa.me/966552125258?text=استفسار عن: ${p.name}" class="whatsapp-item-btn">
                        استفسار عبر واتساب
                    </a>
                </div>`).join('');
        }
        start();
    </script>
</body>
</html>
