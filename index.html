<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | المعرض</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* نفس ستايلات الفخامة السابقة */
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before, body::after { content: ''; position: fixed; width: 40vw; height: 40vw; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 60%); z-index: -1; animation: float 15s infinite ease-in-out alternate; }
        body::before { top: -10%; right: -10%; }
        body::after { bottom: -10%; left: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        header { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); padding: 10px 5%; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: var(--glass-shadow); height: 70px; }
        .logo { height: 45px; object-fit: contain; transition: transform 0.3s ease; }
        .logo:hover { transform: scale(1.05); }

        .header-whatsapp { position: absolute; left: 5%; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.0)); backdrop-filter: blur(10px); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 50%; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; text-decoration: none; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header-whatsapp:hover { background: var(--text-main); color: #000; transform: translateY(-2px); }
        .header-whatsapp svg { width: 22px; height: 22px; fill: currentColor; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-title { text-align: center; margin-bottom: 5px; font-size: 2rem; font-weight: 700; background: linear-gradient(to left, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .section-subtitle { text-align: center; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; font-weight: 400; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr) !important; gap: 20px; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; box-shadow: var(--glass-shadow); position: relative; }
        
        .cat-card { cursor: pointer; aspect-ratio: 1; }
        .cat-card .image-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .cat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.55); z-index: 1; transition: background 0.4s ease; }
        .cat-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .cat-card:hover::before { background: rgba(0, 0, 0, 0.7); }
        .cat-card:hover img { transform: scale(1.08); }
        .cat-card h3 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; color: #fff; text-align: center; font-size: 1.4rem; font-weight: 700; width: 90%; text-shadow: 0 4px 15px rgba(0,0,0,0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cat-card:hover h3 { transform: translate(-50%, calc(-50% + 15px)); }

        #products-section { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        #category-title { font-size: 1.8rem; font-weight: 700; }
        .btn-back { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.95rem; backdrop-filter: blur(5px); }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); }
        .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .filter-btn { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; }
        .filter-btn.active, .filter-btn:hover { background: var(--text-main); color: #000; border-color: var(--text-main); }

        .product-card { display: flex; flex-direction: column; align-items: center; padding-bottom: 15px; }
        .product-card .image-container { width: 100%; aspect-ratio: 1; overflow: hidden; border-bottom: 1px solid var(--glass-border); position: relative; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .product-card h4 { font-size: 1rem; margin: 15px 10px; font-weight: 500; text-align: center; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-whatsapp { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 20px; text-decoration: none; border-radius: 30px; font-size: 0.85rem; width: 85%; text-align: center; margin-top: auto; }
        .product-whatsapp:hover { background: var(--text-main); color: #000; transform: scale(1.05); }

        /* ستايلات سلايدر Swiper */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        .swiper-button-next, .swiper-button-prev { color: rgba(255,255,255,0.8) !important; background: rgba(0,0,0,0.3); width: 30px !important; height: 30px !important; border-radius: 50%; backdrop-filter: blur(4px); }
        .swiper-button-next::after, .swiper-button-prev::after { font-size: 14px !important; font-weight: bold; }
        .swiper-pagination-bullet { background: #fff !important; opacity: 0.5; }
        .swiper-pagination-bullet-active { opacity: 1; }

        @media (max-width: 768px) {
            .grid { gap: 8px; }
            .container { padding: 30px 10px; }
            .section-title { font-size: 1.5rem; }
            .section-subtitle { font-size: 0.95rem; margin-bottom: 30px; }
            .cat-card h3 { font-size: 0.85rem; }
            .cat-card:hover h3 { transform: translate(-50%, calc(-50% + 8px)); }
            .product-card h4 { font-size: 0.75rem; margin: 10px 5px; }
            .product-whatsapp { padding: 6px 10px; width: 90%; font-size: 0.75rem; }
            .products-header { flex-direction: column; gap: 15px; }
            #category-title { font-size: 1.4rem; }
            .swiper-button-next, .swiper-button-prev { display: none; /* إخفاء الأسهم بالجوال والاعتماد على السحب */ }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/XftPtTSg/image.png" alt="ATHNTA Logo" class="logo" onclick="location.reload()" style="cursor:pointer;">
        <a href="https://wa.me/966552125258" class="header-whatsapp" target="_blank" title="تواصل معنا">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
            </svg>
        </a>
    </header>

    <main class="container">
        <section id="categories-section">
            <h1 class="section-title">أعمالنا المنفذة</h1>
            <p class="section-subtitle">هنا كل اعمالنا المنفذة خصيصا لكم 🤍</p>
            <div class="grid" id="categories-grid"></div>
        </section>

        <section id="products-section">
            <div class="products-header">
                <h2 id="category-title">اسم القسم</h2>
                <button class="btn-back" onclick="location.reload()">العودة للأقسام</button>
            </div>
            <div class="filters" id="filters-container"></div>
            <div class="grid" id="products-grid"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  

        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/400x400/222/fff?text=Image';
        }

        async function loadData() {
            const catGrid = document.getElementById('categories-grid');
            try {
                const cSnap = await db.collection("categories").get();
                catGrid.innerHTML = ''; 
                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    catGrid.innerHTML += `
                        <div class="glass-card cat-card" onclick="showProducts('${doc.id}')">
                            <div class="image-container">
                                <img src="${formatURL(data.imageUrl)}" alt="${doc.id}">
                            </div>
                            <h3>${doc.id}</h3>
                        </div>
                    `;
                });

                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                catGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">حدث خطأ في جلب البيانات.</p>';
                console.error(error);
            }
        }

        window.showProducts = (categoryId) => {
            document.getElementById('categories-section').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterData('${categoryId}', 'all', event)">الكل</button>`;
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterData('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }

            filterData(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filterData = (mainCat, subCat, event) => {
            if(event) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCat);
            if(subCat !== 'all') {
                filtered = filtered.filter(p => p.subCategory === subCat);
            }

            const prodGrid = document.getElementById('products-grid');
            
            if(filtered.length === 0) {
                prodGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 1.2rem;">لا توجد منتجات هنا حالياً.</p>';
                return;
            }

            // رسم المنتجات مع سلايدر في حال وجود أكثر من صورة
            prodGrid.innerHTML = filtered.map((p, index) => {
                let imagesHtml = '';
                // دعم قواعد البيانات القديمة والجديدة
                let urls = p.imageURLs || (p.imageUrl ? [p.imageUrl] : []); 

                if(urls.length > 1) {
                    // السلايدر
                    imagesHtml = `
                        <div class="swiper productSwiper">
                            <div class="swiper-wrapper">
                                ${urls.map(u => `<div class="swiper-slide"><img src="${formatURL(u)}" loading="lazy" alt="${p.name}"></div>`).join('')}
                            </div>
                            <div class="swiper-pagination"></div>
                            <div class="swiper-button-next"></div>
                            <div class="swiper-button-prev"></div>
                        </div>
                    `;
                } else {
                    // صورة واحدة عادية
                    imagesHtml = `<img src="${formatURL(urls[0])}" loading="lazy" alt="${p.name}">`;
                }

                return `
                    <div class="glass-card product-card">
                        <div class="image-container">
                            ${imagesHtml}
                        </div>
                        <h4>${p.name}</h4>
                        <a href="https://wa.me/966552125258?text=استفسار عن: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                            استفسار
                        </a>
                    </div>
                `;
            }).join('');

            // تفعيل السلايدر (Swiper) بعد رسم العناصر في الشاشة
            setTimeout(() => {
                new Swiper(".productSwiper", {
                    navigation: {
                        nextEl: ".swiper-button-next",
                        prevEl: ".swiper-button-prev",
                    },
                    pagination: {
                        el: ".swiper-pagination",
                        clickable: true,
                    },
                    grabCursor: true, // شكل الماوس كاليد للسحب
                    loop: true // العودة للصورة الأولى بعد الأخيرة
                });
            }, 100);
        }

        loadData();
    </script>
</body>
</html>
