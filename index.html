<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | Luxury Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* ==========================================
           1. Design System & Variables
           ========================================== */
        :root {
            --bg-dark: #030303;
            --bg-surface: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --gold-accent: #D4AF37; /* ذهبي فخم */
            --gold-dim: rgba(212, 175, 55, 0.2);
            --border-subtle: rgba(255, 255, 255, 0.05);
            --radius-sm: 8px; /* زوايا أنيقة */
            --transition-slow: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ==========================================
           2. Navbar / Header
           ========================================== */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(3, 3, 3, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            transition: var(--transition-fast);
        }

        .logo {
            height: 45px; /* حجم أنيق ومتناسق */
            cursor: pointer;
            transition: transform var(--transition-fast);
        }
        .logo:hover { transform: scale(1.05); }

        .nav-whatsapp {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 300;
            font-size: 0.9rem;
            transition: var(--transition-fast);
            padding: 8px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
        }
        .nav-whatsapp:hover {
            border-color: var(--gold-accent);
            color: var(--gold-accent);
        }
        .nav-whatsapp svg { width: 20px; height: 20px; fill: currentColor; }

        /* ==========================================
           3. Hero Section
           ========================================== */
        .hero {
            padding: 150px 5% 50px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeUp 1s ease forwards;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* ==========================================
           4. Categories Grid (Editorial Style)
           ========================================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 100px;
        }

        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .category-card {
            position: relative;
            aspect-ratio: 3 / 4; /* أبعاد كلاسيكية للصور الفنية */
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-surface);
        }

        .category-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.8;
            filter: grayscale(20%);
            transition: var(--transition-slow);
        }

        .category-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 30px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: var(--transition-slow);
        }

        .category-info h2 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin: 0;
            color: var(--text-primary);
            transition: var(--transition-fast);
        }

        /* Hover Effects */
        .category-card:hover img {
            transform: scale(1.05);
            opacity: 1;
            filter: grayscale(0%);
        }
        .category-card:hover .category-info h2 {
            color: var(--gold-accent);
            transform: translateY(-5px);
        }

        /* ==========================================
           5. Products View
           ========================================== */
        #products-view { display: none; animation: fadeUp 0.8s ease forwards; }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .view-header h2 {
            font-size: 2rem; font-weight: 200; color: var(--gold-accent);
        }
        
        .btn-back {
            background: transparent; color: var(--text-secondary);
            border: none; cursor: pointer; font-size: 1rem; font-family: 'Tajawal';
            transition: var(--transition-fast);
        }
        .btn-back:hover { color: var(--text-primary); }

        /* Filters */
        .filters {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px;
        }
        .filter-btn {
            background: transparent; border: 1px solid var(--border-subtle);
            color: var(--text-secondary); padding: 8px 24px;
            border-radius: 50px; cursor: pointer; font-family: 'Tajawal';
            transition: var(--transition-fast);
        }
        .filter-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--text-primary); color: var(--bg-dark); border-color: var(--text-primary);
        }

        /* Products Grid */
        .grid-products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            display: flex; flex-direction: column; gap: 15px;
        }

        .product-img-wrapper {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-surface);
        }
        .product-img-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            transition: var(--transition-slow);
        }
        .product-img-wrapper:hover img { transform: scale(1.08); }

        .product-details h3 {
            font-size: 1.1rem; font-weight: 300; margin-bottom: 10px;
        }

        /* زر الواتساب الفخم للمنتج */
        .product-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gold-accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-fast);
        }
        .product-whatsapp svg { width: 16px; height: 16px; fill: currentColor; }
        .product-whatsapp:hover { color: var(--text-primary); gap: 12px; } /* حركة السهم/المسافة */

        /* ==========================================
           Animations & Responsive
           ========================================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero { padding: 120px 5% 40px; }
            .hero h1 { font-size: 2rem; }
            /* في الجوال: نعرض شريحتين جنب بعض كحد أقصى للحفاظ على الـ UX */
            .grid-categories { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .category-info { padding: 20px 15px 15px; }
            .category-info h2 { font-size: 1.1rem; }
            
            .grid-products { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .view-header { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/XftPtTSg/image.png" class="logo" onclick="location.reload()" alt="ATHNTA">
        <a href="https://wa.me/966552125258" class="nav-whatsapp" target="_blank">
            <svg viewBox="0 0 32 32"><path d="M16 0c-8.837 0-16 7.163-16 16 0 2.825 0.733 5.486 2.017 7.796l-2.017 7.354 7.527-1.974c2.247 1.218 4.82 1.911 7.55 1.911 8.837 0 16-7.163 16-16s-7.163-16-16-16zm8.29 22.162c-0.342 0.963-1.733 1.764-2.386 1.87-0.654 0.107-1.306 0.193-4.223-0.972-2.917-1.166-4.722-4.144-4.867-4.337-0.145-0.193-1.182-1.571-1.182-2.997 0-1.427 0.745-2.128 1.011-2.42 0.266-0.292 0.58-0.365 0.774-0.365s0.387 0.004 0.556 0.012c0.178 0.008 0.419-0.067 0.655 0.505 0.237 0.573 0.81 1.974 0.881 2.118s0.118 0.312 0.022 0.505c-0.095 0.193-0.142 0.312-0.284 0.478-0.142 0.166-0.301 0.369-0.428 0.495-0.142 0.142-0.292 0.297-0.125 0.584 0.166 0.284 0.739 1.216 1.589 1.971 1.096 0.974 2.022 1.274 2.308 1.417 0.284 0.142 0.45 0.118 0.617-0.071 0.166-0.193 0.713-0.833 0.903-1.118 0.193-0.284 0.381-0.237 0.641-0.142s1.64 0.774 1.924 0.917c0.284 0.142 0.474 0.213 0.545 0.337 0.071 0.124 0.071 0.718-0.271 1.681z"/></svg>
            تواصل معنا
        </a>
    </header>

    <main id="app">
        <section id="home-view">
            <div class="hero">
                <h1>ATHNTA</h1>
                <p>أعمالنا المنفذة خصيصاً لكم، تعكس رؤيتنا في الفخامة والإتقان.</p>
            </div>
            <div class="container grid-categories" id="categories-container">
                </div>
        </section>

        <section id="products-view" class="container">
            <div class="view-header">
                <div>
                    <button class="btn-back" onclick="location.reload()">← العودة للمعرض</button>
                    <h2 id="gallery-title" style="margin-top: 10px;"></h2>
                </div>
            </div>
            
            <div class="filters" id="filters-container">
                </div>
            
            <div class="grid-products" id="products-container">
                </div>
        </section>
    </main>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  

        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/600x800/111/333?text=ATHNTA';
        }

        // جلب البيانات الأساسية
        async function initApp() {
            const catContainer = document.getElementById('categories-container');
            
            try {
                // 1. جلب الأقسام
                const cSnap = await db.collection("categories").get();
                catContainer.innerHTML = ''; 

                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    
                    catContainer.innerHTML += `
                        <div class="category-card" onclick="openCategory('${doc.id}')">
                            <img src="${formatURL(data.imageUrl)}" loading="lazy" alt="${doc.id}">
                            <div class="category-info">
                                <h2>${doc.id}</h2>
                            </div>
                        </div>`;
                });

                // 2. جلب المنتجات
                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                console.error("Error loading data:", error);
                catContainer.innerHTML = '<p style="text-align:center; color:red;">حدث خطأ في تحميل البيانات.</p>';
            }
        }

        // الانتقال لصفحة المنتجات
        window.openCategory = (categoryId) => {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('products-view').style.display = 'block';
            document.getElementById('gallery-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterProducts('${categoryId}', 'all', event)">الكل</button>`;
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterProducts('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }

            filterProducts(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // فلترة وعرض المنتجات
        window.filterProducts = (mainCatId, subCatName, event) => {
            if(event) { 
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCatId);
            if(subCatName !== 'all') { 
                filtered = filtered.filter(p => p.subCategory === subCatName); 
            }
            
            const prodContainer = document.getElementById('products-container');
            
            if(filtered.length === 0) {
                prodContainer.innerHTML = '<p style="grid-column: 1/-1; color:var(--text-secondary); text-align:center; padding:40px;">لا توجد أعمال لعرضها حالياً.</p>';
                return;
            }

            prodContainer.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <img src="${formatURL(p.imageUrl)}" loading="lazy" alt="${p.name}">
                    </div>
                    <div class="product-details">
                        <h3>${p.name}</h3>
                        <a href="https://wa.me/966552125258?text=استفسار بخصوص العمل: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                            <svg viewBox="0 0 32 32"><path d="M16 0c-8.837 0-16 7.163-16 16 0 2.825 0.733 5.486 2.017 7.796l-2.017 7.354 7.527-1.974c2.247 1.218 4.82 1.911 7.55 1.911 8.837 0 16-7.163 16-16s-7.163-16-16-16zm8.29 22.162c-0.342 0.963-1.733 1.764-2.386 1.87-0.654 0.107-1.306 0.193-4.223-0.972-2.917-1.166-4.722-4.144-4.867-4.337-0.145-0.193-1.182-1.571-1.182-2.997 0-1.427 0.745-2.128 1.011-2.42 0.266-0.292 0.58-0.365 0.774-0.365s0.387 0.004 0.556 0.012c0.178 0.008 0.419-0.067 0.655 0.505 0.237 0.573 0.81 1.974 0.881 2.118s0.118 0.312 0.022 0.505c-0.095 0.193-0.142 0.312-0.284 0.478-0.142 0.166-0.301 0.369-0.428 0.495-0.142 0.142-0.292 0.297-0.125 0.584 0.166 0.284 0.739 1.216 1.589 1.971 1.096 0.974 2.022 1.274 2.308 1.417 0.284 0.142 0.45 0.118 0.617-0.071 0.166-0.193 0.713-0.833 0.903-1.118 0.193-0.284 0.381-0.237 0.641-0.142s1.64 0.774 1.924 0.917c0.284 0.142 0.474 0.213 0.545 0.337 0.071 0.124 0.071 0.718-0.271 1.681z"/></svg>
                            استفسار عن العمل
                        </a>
                    </div>
                </div>`).join('');
        }

        // تشغيل التطبيق
        initApp();
    </script>
</body>
</html>
