<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض الفخم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* ==========================================
           1. نظام الألوان والمتغيرات
           ========================================== */
        :root {
            --bg-dark: #050505;
            --bg-surface: #111111;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --gold-accent: #D4AF37; 
            --border-subtle: rgba(255, 255, 255, 0.08);
            --radius-md: 20px; /* دوران متوازن: ليس حاداً وليس دائرياً جداً */
            --transition-slow: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            --transition-fast: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ==========================================
           2. الهيدر (مدموج ويثبت بذكاء)
           ========================================== */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 40px 5%; /* مساحة واسعة لدمج الهيدر في البداية */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: transparent; /* مدموج مع الخلفية */
            border-bottom: 1px solid transparent;
            transition: all 0.5s ease;
        }

        /* حالة الهيدر عند السكرول */
        header.scrolled {
            padding: 15px 5%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* عنصر وهمي للحفاظ على الشعار في المنتصف تماماً */
        .header-spacer { width: 45px; }

        .logo {
            height: 75px; 
            cursor: pointer;
            transition: all 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.05));
        }
        
        /* تصغير الشعار عند السكرول */
        header.scrolled .logo { height: 45px; }

        /* أيقونة الواتساب (Bootstrap) */
        .nav-whatsapp {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px; height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
            font-size: 1.2rem;
            text-decoration: none;
            transition: var(--transition-fast);
        }
        
        .nav-whatsapp:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.1);
            border-color: #ffffff;
        }

        /* ==========================================
           3. القسم الترحيبي
           ========================================== */
        .hero {
            padding: 160px 5% 60px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeUp 1s ease forwards;
        }
        
        .hero p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        /* ==========================================
           4. شبكة التصنيفات (الشرائح)
           ========================================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 100px;
        }

        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .category-card {
            position: relative;
            aspect-ratio: 3 / 4; 
            border-radius: var(--radius-md); /* دوران متوازن 20px */
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            transition: var(--transition-slow);
        }

        .category-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.8;
            filter: grayscale(15%);
            transition: var(--transition-slow);
        }

        .category-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 50px 30px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .category-info h2 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin: 0;
            color: var(--text-primary);
            transition: var(--transition-fast);
        }

        /* تأثير التمرير */
        .category-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .category-card:hover img {
            transform: scale(1.08);
            opacity: 1;
            filter: grayscale(0%);
        }
        .category-card:hover .category-info h2 {
            color: var(--gold-accent);
            transform: translateY(5px);
        }

        /* ==========================================
           5. صفحة المنتجات (المعرض الداخلي)
           ========================================== */
        #products-view { display: none; animation: fadeUp 0.8s ease forwards; }

        .view-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
            text-align: center;
        }
        
        .btn-back {
            background: transparent; color: var(--text-secondary);
            border: none; cursor: pointer; font-size: 1rem; font-family: 'Tajawal';
            transition: var(--transition-fast);
            margin-bottom: 15px;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-back:hover { color: var(--text-primary); }

        .view-header h2 {
            font-size: 2.2rem; font-weight: 200; color: var(--text-primary);
            letter-spacing: 2px; margin: 0;
        }

        /* فلاتر الأقسام الفرعية */
        .filters {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 40px;
        }
        .filter-btn {
            background: transparent; border: 1px solid var(--border-subtle);
            color: var(--text-secondary); padding: 10px 28px;
            border-radius: 50px; cursor: pointer; font-family: 'Tajawal'; font-weight: 300;
            transition: var(--transition-fast);
        }
        .filter-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--text-primary); color: var(--bg-dark); border-color: var(--text-primary); font-weight: 500;
        }

        /* شبكة المنتجات */
        .grid-products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            display: flex; flex-direction: column; gap: 15px;
        }

        .product-img-wrapper {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius-md); /* دوران متوازن 20px */
            overflow: hidden;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            transition: var(--transition-slow);
        }
        
        .product-img-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            transition: var(--transition-slow);
        }
        
        .product-img-wrapper:hover { border-color: rgba(255,255,255,0.2); }
        .product-img-wrapper:hover img { transform: scale(1.08); }

        .product-details { text-align: center; }
        .product-details h3 {
            font-size: 1.1rem; font-weight: 300; margin-bottom: 12px; color: #ddd;
        }

        /* زر الواتساب الأنيق للمنتج */
        .product-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 300;
            padding: 10px 20px;
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
            transition: var(--transition-fast);
            width: 100%;
        }
        .product-whatsapp i { font-size: 1.1rem; }
        
        .product-whatsapp:hover { 
            background: #ffffff; 
            color: #000000; 
        }

        /* ==========================================
           حركات وأنيميشن (Animations)
           ========================================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header { padding: 30px 5%; }
            header.scrolled { padding: 12px 5%; }
            .logo { height: 55px; }
            .hero { padding: 130px 5% 40px; }
            .hero p { font-size: 1rem; }
            
            /* عرض شريحتين في الجوال */
            .grid-categories { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .category-card { border-radius: 16px; } /* دوران أصغر قليلاً في الجوال */
            .category-info { padding: 25px 15px 15px; }
            .category-info h2 { font-size: 1.1rem; }
            
            .grid-products { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-img-wrapper { border-radius: 16px; }
            .product-details h3 { font-size: 0.9rem; }
            .product-whatsapp { padding: 8px; font-size: 0.8rem; }
            .product-whatsapp i { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-spacer"></div>
        
        <img src="https://i.ibb.co/XftPtTSg/image.png" class="logo" onclick="location.reload()" alt="Logo">
        
        <a href="https://wa.me/966552125258" class="nav-whatsapp" target="_blank" title="تواصل معنا عبر واتساب">
            <i class="bi bi-whatsapp"></i>
        </a>
    </header>

    <main id="app">
        <section id="home-view">
            <div class="hero">
                <p>أعمالنا المنفذة خصيصاً لكم، تعكس رؤيتنا في الفخامة والإتقان.</p>
            </div>
            <div class="container grid-categories" id="categories-container">
                </div>
        </section>

        <section id="products-view" class="container">
            <div class="view-header">
                <button class="btn-back" onclick="location.reload()">
                    <i class="bi bi-arrow-right"></i> العودة للمعرض
                </button>
                <h2 id="gallery-title"></h2>
            </div>
            
            <div class="filters" id="filters-container">
                </div>
            
            <div class="grid-products" id="products-container">
                </div>
        </section>
    </main>

    <script>
        // تأثير السكرول للهيدر
        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 30) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  

        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/600x800/111/333?text=ATHNTA';
        }

        // جلب البيانات
        async function initApp() {
            const catContainer = document.getElementById('categories-container');
            
            try {
                const cSnap = await db.collection("categories").get();
                catContainer.innerHTML = ''; 

                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    
                    catContainer.innerHTML += `
                        <div class="category-card" onclick="openCategory('${doc.id}')">
                            <img src="${formatURL(data.imageUrl)}" loading="lazy" alt="${doc.id}">
                            <div class="category-info">
                                <h2>${doc.id}</h2>
                            </div>
                        </div>`;
                });

                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                console.error("Error loading data:", error);
                catContainer.innerHTML = '<p style="text-align:center; color:red;">حدث خطأ في تحميل البيانات.</p>';
            }
        }

        // الانتقال لصفحة المنتجات
        window.openCategory = (categoryId) => {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('products-view').style.display = 'block';
            document.getElementById('gallery-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterProducts('${categoryId}', 'all', event)">الكل</button>`;
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterProducts('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }

            filterProducts(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // فلترة وعرض المنتجات
        window.filterProducts = (mainCatId, subCatName, event) => {
            if(event) { 
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCatId);
            if(subCatName !== 'all') { 
                filtered = filtered.filter(p => p.subCategory === subCatName); 
            }
            
            const prodContainer = document.getElementById('products-container');
            
            if(filtered.length === 0) {
                prodContainer.innerHTML = '<p style="grid-column: 1/-1; color:var(--text-secondary); text-align:center; padding:40px;">لا توجد أعمال لعرضها حالياً.</p>';
                return;
            }

            prodContainer.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <img src="${formatURL(p.imageUrl)}" loading="lazy" alt="${p.name}">
                    </div>
                    <div class="product-details">
                        <h3>${p.name}</h3>
                        <a href="https://wa.me/966552125258?text=استفسار بخصوص العمل: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                            <i class="bi bi-whatsapp"></i> استفسار
                        </a>
                    </div>
                </div>`).join('');
        }

        initApp();
    </script>
</body>
</html>
