<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | المعرض</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* ==========================================
           1. الإعدادات الأساسية والمقاسات الثابتة
           ========================================== */
        :root {
            --bg-dark: #070707;
            --bg-card: #121212;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #ffffff; /* أبيض كلاسيكي للفخامة */
            --border-color: rgba(255, 255, 255, 0.08);
            --header-height: 80px; /* مساحة الهيدر الثابتة لمنع التداخل */
            --radius-md: 16px; 
            --transition-fast: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ==========================================
           2. الهيدر (شريط التنقل العلوي)
           ========================================== */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            background: rgba(7, 7, 7, 0.95); /* خلفية شبه معتمة تمنع التداخل */
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }

        /* وزن وهمي لضبط الشعار في المنتصف بالضبط */
        .header-spacer { width: 40px; }

        .logo {
            height: 35px; /* شعار بحجم أنيق ومضبوط */
            object-fit: contain;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .logo:hover { opacity: 0.8; }

        .nav-whatsapp {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.2rem;
            text-decoration: none;
            transition: var(--transition-fast);
        }
        .nav-whatsapp:hover {
            background: #ffffff;
            color: #000000;
        }

        /* ==========================================
           3. الحاوية الرئيسية (لمنع التداخل مع الهيدر)
           ========================================== */
        main {
            /* مسافة علوية تساوي ارتفاع الهيدر + مسافة تنفس */
            padding-top: calc(var(--header-height) + 40px);
            min-height: calc(100vh - var(--header-height));
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5% 60px;
        }

        /* ==========================================
           4. الصفحة الرئيسية (الترحيب والتصنيفات)
           ========================================== */
        .welcome-msg {
            text-align: center;
            margin-bottom: 50px;
        }
        .welcome-msg p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .category-card {
            position: relative;
            aspect-ratio: 3 / 4; 
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .category-card img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.7; transition: 0.5s ease;
        }
        .category-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 40px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            text-align: center;
        }
        .category-info h2 {
            font-size: 1.3rem; font-weight: 500; color: var(--text-primary);
            transition: 0.3s ease;
        }
        .category-card:hover img { opacity: 1; transform: scale(1.05); }
        .category-card:hover h2 { transform: translateY(-5px); }

        /* ==========================================
           5. صفحة عرض المنتجات (مرتبة بدون تداخل)
           ========================================== */
        #products-view { display: none; }

        .view-header {
            margin-bottom: 30px;
            text-align: right;
        }
        .btn-back {
            background: transparent; color: var(--text-secondary);
            border: none; cursor: pointer; font-size: 1rem; font-family: 'Tajawal';
            display: inline-flex; align-items: center; gap: 8px;
            margin-bottom: 20px; transition: var(--transition-fast);
        }
        .btn-back:hover { color: var(--text-primary); }

        .view-header h2 {
            font-size: 2rem; font-weight: 400; color: var(--accent-color);
            margin: 0;
        }

        .filters {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px;
        }
        .filter-btn {
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-secondary); padding: 8px 20px;
            border-radius: 50px; cursor: pointer; font-family: 'Tajawal'; font-weight: 400;
            transition: var(--transition-fast);
        }
        .filter-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--text-primary); color: var(--bg-dark); font-weight: 500;
        }

        .grid-products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            transition: var(--transition-fast);
        }
        .product-card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-5px); }

        .product-img {
            width: 100%; aspect-ratio: 1; object-fit: cover;
            border-radius: 8px;
        }

        .product-details h3 {
            font-size: 1rem; font-weight: 400; margin-bottom: 15px; text-align: center; color: #eee;
        }

        .product-whatsapp {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            color: var(--text-primary); text-decoration: none; font-size: 0.9rem;
            padding: 10px; border: 1px solid var(--border-color);
            border-radius: 50px; transition: var(--transition-fast); background: rgba(255,255,255,0.02);
        }
        .product-whatsapp:hover { background: var(--text-primary); color: var(--bg-dark); }

        /* ==========================================
           الجوال (تعديلات شاشات صغيرة)
           ========================================== */
        @media (max-width: 768px) {
            :root { --header-height: 70px; }
            main { padding-top: calc(var(--header-height) + 20px); }
            
            .logo { height: 30px; } /* شعار أصغر في الجوال */
            .nav-whatsapp, .header-spacer { width: 35px; height: 35px; font-size: 1rem; }
            
            .grid-categories { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .category-info h2 { font-size: 1.1rem; }
            
            .view-header h2 { font-size: 1.5rem; }
            .grid-products { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card { padding: 10px; gap: 10px; }
            .product-details h3 { font-size: 0.9rem; margin-bottom: 10px; }
            .product-whatsapp { padding: 8px; font-size: 0.8rem; }
            .filters { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-spacer"></div>
        <img src="https://i.ibb.co/XftPtTSg/image.png" class="logo" onclick="location.reload()" alt="ATHNTA">
        <a href="https://wa.me/966552125258" class="nav-whatsapp" target="_blank" title="تواصل عبر واتساب">
            <i class="bi bi-whatsapp"></i>
        </a>
    </header>

    <main>
        <section id="home-view" class="container">
            <div class="welcome-msg">
                <p>أعمالنا المنفذة خصيصاً لكم</p>
            </div>
            <div class="grid-categories" id="categories-container"></div>
        </section>

        <section id="products-view" class="container">
            <div class="view-header">
                <button class="btn-back" onclick="location.reload()">
                    <i class="bi bi-arrow-right"></i> العودة للمعرض
                </button>
                <h2 id="gallery-title"></h2>
            </div>
            
            <div class="filters" id="filters-container"></div>
            
            <div class="grid-products" id="products-container"></div>
        </section>
    </main>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let allProducts = []; 
        let categoriesData = {};  

        function formatURL(url) {
            return url && url.startsWith('http') ? url : 'https://via.placeholder.com/600x800/222/555?text=ATHNTA';
        }

        async function initApp() {
            const catContainer = document.getElementById('categories-container');
            try {
                const cSnap = await db.collection("categories").get();
                catContainer.innerHTML = ''; 

                cSnap.forEach(doc => {
                    const data = doc.data();
                    categoriesData[doc.id] = data; 
                    catContainer.innerHTML += `
                        <div class="category-card" onclick="openCategory('${doc.id}')">
                            <img src="${formatURL(data.imageUrl)}" loading="lazy" alt="${doc.id}">
                            <div class="category-info">
                                <h2>${doc.id}</h2>
                            </div>
                        </div>`;
                });

                const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
                pSnap.forEach(doc => allProducts.push(doc.data()));
                
            } catch (error) {
                console.error("Error:", error);
            }
        }

        window.openCategory = (categoryId) => {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('products-view').style.display = 'block';
            document.getElementById('gallery-title').innerText = categoryId;
            
            const filtersBox = document.getElementById('filters-container');
            filtersBox.innerHTML = `<button class="filter-btn active" onclick="filterProducts('${categoryId}', 'all', event)">الكل</button>`;
            
            if(categoriesData[categoryId].subs && categoriesData[categoryId].subs.length > 0) {
                categoriesData[categoryId].subs.forEach(sub => {
                    filtersBox.innerHTML += `<button class="filter-btn" onclick="filterProducts('${categoryId}', '${sub}', event)">${sub}</button>`;
                });
            }

            filterProducts(categoryId, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filterProducts = (mainCatId, subCatName, event) => {
            if(event) { 
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = allProducts.filter(p => p.mainCategory === mainCatId);
            if(subCatName !== 'all') { 
                filtered = filtered.filter(p => p.subCategory === subCatName); 
            }
            
            const prodContainer = document.getElementById('products-container');
            if(filtered.length === 0) {
                prodContainer.innerHTML = '<p style="grid-column: 1/-1; color:var(--text-secondary); text-align:center;">لا توجد أعمال لعرضها حالياً.</p>';
                return;
            }

            prodContainer.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${formatURL(p.imageUrl)}" loading="lazy" class="product-img" alt="${p.name}">
                    <div class="product-details">
                        <h3>${p.name}</h3>
                        <a href="https://wa.me/966552125258?text=استفسار بخصوص العمل: ${encodeURIComponent(p.name)}" class="product-whatsapp" target="_blank">
                            <i class="bi bi-whatsapp"></i> استفسار
                        </a>
                    </div>
                </div>`).join('');
        }

        initApp();
    </script>
</body>
</html>
