<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHNTA | عراقة وفخامة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            /* خريطة الألوان الكلاسيكية الجديدة */
            --bg-body: #fdfdfc; /* أوف وايت ناعم جداً للخلفية */
            --bg-header: #ffffff; /* أبيض نقي للهيدر */
            --text-main: #121212; /* أسود ملكي للنصوص */
            --gold-classic: #c5a059; /* ذهبي مطفي كلاسيكي */
            --silver-classic: #e0e0e0; /* فضي ناعم للحدود */
            
            /* الحفاظ على تأثيرات الزجاج والوهج بالألوان الجديدة */
            --glass-bg: rgba(255, 255, 255, 0.5); /* زجاجي فاتح */
            --glass-border: rgba(0, 0, 0, 0.05); /* حدود زجاجية ناعمة جداً */
            --glow-effect: rgba(197, 160, 89, 0.2); /* وهج ذهبي خفيف */
        }

        body {
            font-family: 'Times New Roman', serif; /* خط كلاسيكي للعناوين */
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% -20%, #ffffff, #fdfdfc);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* تنسيق الهيدر الأنيق */
        header {
            text-align: center;
            padding: 40px 20px;
            background: var(--bg-header);
            position: relative;
            border-bottom: 1px solid var(--silver-classic);
        }

        .logo {
            height: 100px;
            cursor: pointer;
            filter: grayscale(0.2); /* لمسة كلاسيكية للشعار */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo:hover {
            transform: scale(1.1) rotate(2deg);
        }

        /* رسالة ترحيبية كلاسيكية */
        .welcome-msg {
            text-align: center;
            margin: 40px 0;
            animation: fadeIn 1.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .welcome-msg h1 { font-weight: 300; letter-spacing: 3px; color: var(--text-main); margin-bottom: 5px; }
        .welcome-msg h1::after { content:''; display:block; width:50px; height:1px; background:var(--gold-classic); margin: 10px auto; }
        .welcome-msg p { color: #666; font-size: 0.9rem; }

        /* شبكة التصنيفات الحيوية والتأثيرات الزجاجية */
        .home-categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .home-categories {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 30px;
            }
        }

        .cat-card {
            position: relative;
            border-radius: 15px; /* حواف أنعم قليلاً للطابع الكلاسيكي */
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 0.8 / 1;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(5px); /* تأثير الزجاج */
            transition: all 0.4s ease;
        }

        /* الحفاظ على تأثيرات التمرير القوية */
        .cat-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold-classic);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05), 0 0 15px var(--glow-effect);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.1); /* لمسة دافئة للصور */
            transition: transform 0.6s ease;
        }

        .cat-card:hover img {
            transform: scale(1.1);
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent 60%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 25px;
            text-align: center;
        }

        .cat-overlay h2 {
            margin: 0;
            color: var(--off-white);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--gold-classic);
            padding-bottom: 5px;
        }

        /* شاشة عرض المنتجات المذهلة والحفاظ على الحركة */
        .products-view {
            display: none;
            padding: 20px;
            max-width: 1300px;
            margin: 0 auto;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .products-view.active { display: block; }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--silver-classic);
            padding-bottom: 15px;
        }

        .back-btn {
            background: var(--text-main);
            border: none;
            color: var(--silver-classic);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--gold-classic);
            color: #000;
        }

        /* أزرار الأقسام الفرعية بالألوان الكلاسيكية */
        .sub-cats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 35px;
            justify-content: center;
        }

        .sub-cats button {
            background: var(--bg-header);
            border: 1px solid var(--silver-classic);
            color: #666;
            padding: 10px 25px;
            border-radius: 0; /* زوايا حادة للكلاسيكية */
            cursor: pointer;
            transition: 0.3s;
        }

        .sub-cats button.active {
            background: var(--text-main);
            border-color: var(--gold-classic);
            color: var(--gold-classic);
            font-weight: bold;
        }

        /* المعرض وتأثيرات التمرير */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 30px;
            }
        }

        .item {
            background: var(--bg-header);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--silver-classic);
            transition: 0.3s;
        }

        .item:hover {
            border-color: var(--gold-classic);
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .item h3 {
            padding: 15px;
            text-align: center;
            margin: 0;
            font-size: 1rem;
            color: var(--text-main);
            background: rgba(0,0,0,0.02);
        }

    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/4nNNrTY5/5-Dk-XXIEg7i-UZlzdd-Mb-FCA1-EBP00-Wu-JWzy9hg-Ovj8.avif" class="logo" onclick="location.reload()">
    </header>

    <div id="home-section">
        <div class="welcome-msg">
            <h1>ATHNTA</h1>
            <p>العراقة في كل تفصيل، الفخامة في كل اختيار</p>
        </div>
        <div class="home-categories" id="home"></div>
    </div>

    <div class="products-view" id="view">
        <div class="view-header">
            <h2 id="title" style="color:var(--text-main); margin:0; font-weight: 300;"></h2>
            <button onclick="location.reload()" class="back-btn">← العودة</button>
        </div>
        <div class="sub-cats" id="subs"></div>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCN7d0p7Wv6ACXiz_Xp3mRkzEF4g0iiXKE",
            authDomain: "athnta-gallary.firebaseapp.com",
            projectId: "athnta-gallary",
            storageBucket: "athnta-gallary.firebasestorage.app",
            messagingSenderId: "814746418768",
            appId: "1:814746418768:web:e4e08b4cee435498269b55"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let prods = [], cats = {};

        async function start() {
            const cSnap = await db.collection("categories").get();
            const homeBox = document.getElementById('home');
            cSnap.forEach(doc => {
                cats[doc.id] = doc.data();
                homeBox.innerHTML += `
                    <div class="cat-card" onclick="openCat('${doc.id}')">
                        <img src="${doc.data().imageUrl}" loading="lazy">
                        <div class="cat-overlay"><h2>${doc.id}</h2></div>
                    </div>`;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => prods.push(doc.data()));
        }

        window.openCat = (id) => {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('view').classList.add('active');
            document.getElementById('title').innerText = id;
            const subBox = document.getElementById('subs');
            subBox.innerHTML = `<button class="active" onclick="filter('${id}', 'all', event)">الكل</button>`;
            if(cats[id].subs) {
                cats[id].subs.forEach(s => subBox.innerHTML += `<button onclick="filter('${id}', '${s}', event)">${s}</button>`);
            }
            filter(id, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filter = (main, sub, e) => {
            if(e) { 
                document.querySelectorAll('.sub-cats button').forEach(b=>b.classList.remove('active')); 
                e.target.classList.add('active'); 
            }
            let filtered = prods.filter(p => p.mainCategory === main);
            if(sub !== 'all') filtered = filtered.filter(p => p.subCategory === sub);
            
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = filtered.map(p => `
                <div class="item">
                    <img src="${p.imageUrl}" loading="lazy">
                    <h3>${p.name}</h3>
                </div>`).join('');
        }
        start();
    </script>
</body>
</html>
